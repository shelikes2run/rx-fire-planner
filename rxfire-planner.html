.agency-info strong{color:#94A3B8;display:block;font-size:12px;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:56px;background:#0A1520;border-bottom:1px solid #1E3448;display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}

.topbar-meta{font-size:12px;color:#64748B;}
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:#2D6A4F;color:#fff;}
.btn-primary:hover{background:#40916C;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-outline{background:transparent;border:1px solid #2D4057;color:#94A3B8;}
.btn-outline:hover{border-color:#40916C;color:#52B788;}
.btn-danger{background:#7F1D1D;color:#FCA5A5;}
.content{flex:1;overflow-y:auto;padding:20px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.card{background:#1C2D3E;border:1px solid #1E3448;border-radius:10px;padding:16px;}

.card-title{font-size:13px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;}
.kpi-val{font-size:28px;font-weight:700;color:#E2E8F0;line-height:1;}
.kpi-sub{font-size:11px;color:#64748B;margin-top:4px;}
.kpi-icon{font-size:24px;}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
.status-dot.green{background:#22C55E;}
.status-dot.orange{background:#F59E0B;}
.status-dot.red{background:#EF4444;}
.status-dot.gray{background:#475569;}

.p-high{background:#78350F;color:#FCD34D;}
.p-medium{background:#14532D;color:#86EFAC;}
.p-low{background:#1E3A5F;color:#93C5FD;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #1E3448;}
td{padding:10px 12px;border-bottom:1px solid #1E3448;color:#CBD5E1;}

.month-label{font-size:9px;color:#64748B;font-weight:600;}

   smoke:{airBasin:'Great Basin Valleys',permitReq:false,receptors:'Mammoth Lakes Town (3 mi)',mitigation:'Notify GBUAPCD. Monitor PM2.5 at Mammoth airport station.'}}
];

function calcPriority(u) {
  const windowScore = (100 - u.windowPct) * 0.6;
  const statusBonus = u.status === 'Approved' ? 20 : 10;
  const acresBonus = Math.min(u.acres / 50, 10);
  return Math.round(windowScore + statusBonus + acresBonus);
}

function checkParam(val, min, max) {
  if (val === undefined || val === null) return 'unknown';
  if (min !== undefined && val < min) return 'nogo';
  if (max !== undefined && val > max) return 'nogo';
  const range = (max || 0) - (min || 0);
  const buffer = range * 0.1;
  if (min !== undefined && val < min + buffer) return 'marginal';
  if (max !== undefined && val > max - buffer) return 'marginal';
  return 'go';
}

function isInWindow(unit) {
  const c = unit.currentCond;
  const r = unit.rx;
  return c.temp >= r.tempMin && c.temp <= r.tempMax &&
    c.rh >= r.rhMin && c.rh <= r.rhMax &&
    c.wind >= r.windMin && c.wind <= r.windMax &&
    c.fm10 >= r.fm10Min && c.fm10 <= r.fm10Max &&
    c.fm100 <= r.fm100Max && c.haines <= r.hainesMax &&
    c.erc >= r.ercMin && c.erc <= r.ercMax && c.aqi < 100;
}

function hmColor(pct) {
  if (!pct || pct === 0) return '#0F1923';
  if (pct < 6) return '#1B4332';
  if (pct < 13) return '#2D6A4F';
  if (pct < 20) return '#40916C';
  if (pct < 28) return '#52B788';
  return '#74C69D';
}

function priorityColor(score) {
  if (score >= 90) return 'p-critical';
  if (score >= 80) return 'p-high';
  if (score >= 65) return 'p-medium';
  return 'p-low';
}

function priorityLabel(score) {
  if (score >= 90) return 'Critical';
  if (score >= 80) return 'High';
  if (score >= 65) return 'Medium';
  return 'Low';
}

function aqiCategory(aqi) {
  if (aqi <= 50) return {label:'Good',color:'#22C55E'};
  if (aqi <= 100) return {label:'Moderate',color:'#EAB308'};
  if (aqi <= 150) return {label:'Unhealthy for Sensitive',color:'#F97316'};
  return {label:'Unhealthy',color:'#EF4444'};
}

function CalendarView({units}) {
  const [month, setMonth] = useState(TODAY.getMonth());
  const [year, setYear] = useState(TODAY.getFullYear());
  const [selectedDay, setSelectedDay] = useState(null);

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();

  function unitsForDay(dayOfMonth) {
    const d = new Date(year, month, dayOfMonth);
    return units.filter(u => {
      const prob = u.monthly[month] || 0;
      const seed = (u.id * 7 + dayOfMonth * 13) % 100;
      return seed < prob && u.targetMonths.includes(month);
    });
  }

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push({day: daysInPrev - firstDay + 1 + i, type:'prev'});
  for (let i = 1; i <= daysInMonth; i++) cells.push({day:i, type:'current'});
  let next = 1;
  while (cells.length % 7 !== 0) cells.push({day: next++, type:'next'});

  const selectedUnits = selectedDay ? unitsForDay(selectedDay) : [];

  return (
    <div>
      <div className="card" style={{marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <button className="btn btn-outline btn-sm" onClick={() => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); }}>◀ Prev</button>
          <div style={{flex:1,textAlign:'center',fontSize:18,fontWeight:700,color:'#E2E8F0'}}>{MONTH_FULL[month]} {year}</div>
          <button className="btn btn-outline btn-sm" onClick={() => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); }}>Next ▶</button>
        </div>
      </div>
      <div className="grid-2" style={{alignItems:'start'}}>
        <div className="card">
          <div className="cal-grid">
            {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => <div key={d} className="cal-header">{d}</div>)}
            {cells.map((cell, i) => {
              const dayUnits = cell.type === 'current' ? unitsForDay(cell.day) : [];
              const isToday = cell.type==='current' && cell.day===TODAY.getDate() && month===TODAY.getMonth() && year===TODAY.getFullYear();
              const isSelected = cell.type==='current' && cell.day===selectedDay;
              const bgInt = dayUnits.length;
              const bgColor = bgInt === 0 ? '#152030' : bgInt === 1 ? '#1B4332' : bgInt <= 3 ? '#2D6A4F' : '#40916C';
              return (
                <div key={i}
                  className={`cal-day ${isToday?'today':''} ${cell.type!=='current'?'other-month':''}`}
                  style={{background: cell.type==='current' ? bgColor : '#0F1923', border: isSelected ? '2px solid #52B788' : '', cursor: cell.type==='current'?'pointer':'default'}}
                  onClick={() => cell.type==='current' && setSelectedDay(cell.day)}
                >
                  <div className="cal-day-num" style={isToday?{color:'#52B788'}:{}}>{cell.day}</div>
                  <div className="cal-units">
                    {dayUnits.slice(0,3).map(u => (
                      <div key={u.id} className="cal-unit-chip" style={{background:'#166534',color:'#86EFAC'}}>{u.name.split(' ').slice(0,2).join(' ')}</div>
                    ))}
                    {dayUnits.length > 3 && <div style={{fontSize:9,color:'#64748B'}}>+{dayUnits.length-3} more</div>}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{marginTop:12,display:'flex',gap:10,fontSize:11,color:'#64748B'}}>
            {[[0,'#152030','No units'],[1,'#1B4332','1 unit'],[3,'#2D6A4F','2–3 units'],[5,'#40916C','4+ units']].map(([,c,l]) => (
              <div key={l} style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:12,height:12,background:c,borderRadius:2}}/>{l}</div>
            ))}
          </div>
        </div>

                    <div key={u.id} style={{padding:'10px',background:'#152030',borderRadius:8,marginBottom:8,border:'1px solid #1E3448'}}>
                      <div style={{fontWeight:600,color:'#E2E8F0',fontSize:13}}>{u.name}</div>
                      <div style={{fontSize:11,color:'#64748B',marginTop:2}}>{u.forest} · {u.acres} ac · Window: {u.monthly[month]}% historically</div>
                      <div style={{marginTop:8,display:'flex',flexWrap:'wrap',gap:4}}>
                        <span className="info-pill pill-blue">Temp: {u.rx.tempMin}–{u.rx.tempMax}°F</span>

            {units.filter(u => u.targetMonths.includes(month)).length > 0 ? (

                    <span style={{color:'#E2E8F0',fontWeight:600}}>{u.name}</span>

          </div>
        </div>
      </div>
    </div>
  );

// ─── Burn Units Table ─────────────────────────────────────────────────────────
function BurnUnitsTable({units, setSelectedUnit, setView}) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  let filtered = [...units].sort((a,b) => b.priorityScore - a.priorityScore);
  if (filter === 'window') filtered = filtered.filter(isInWindow);
  if (filter === 'approved') filtered = filtered.filter(u => u.status === 'Approved');
  if (search) filtered = filtered.filter(u => u.name.toLowerCase().includes(search.toLowerCase()) || u.forest.toLowerCase().includes(search.toLowerCase()));
  return (
    <div>
      <div className="card" style={{marginBottom:14}}>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <input placeholder="🔍 Search units..." value={search} onChange={e=>setSearch(e.target.value)} style={{background:'#0F1923',border:'1px solid #2D4057',borderRadius:6,padding:'7px 12px',color:'#E2E8F0',fontSize:13,flex:1}}/>
          {['all','window','approved'].map(f => (
            <button key={f} className={`btn ${filter===f?'btn-primary':'btn-outline'} btn-sm`} onClick={() => setFilter(f)}>
              {f==='all'?'All Units':f==='window'?'✅ In Window':'Approved Only'}
            </button>
          ))}
        </div>
      </div>
      <div className="card">
        <table>
          <thead><tr>
            <th>#</th><th>Unit Name</th><th>Forest / District</th><th>Acres</th>
            <th>Status</th><th>Priority</th><th>Window %</th><th>Peak Season</th><th>Today</th>
          </tr></thead>
          <tbody>
            {filtered.map((u,i) => {
              const inW = isInWindow(u);
              const peak = u.monthly.map((v,j)=>({v,j})).sort((a,b)=>b.v-a.v).slice(0,3).map(x=>MONTHS[x.j]).join(', ');
              return (
                <tr key={u.id} style={{cursor:'pointer'}} onClick={()=>{setSelectedUnit(u);setView('unit-detail');}}>
                  <td><span className={`priority-badge ${priorityColor(u.priorityScore)}`}>{u.priorityScore>=90?'🔴':u.priorityScore>=80?'🟠':'🟡'}{i+1}</span></td>
                  <td><div style={{fontWeight:600,color:'#E2E8F0'}}>{u.name}</div><div style={{fontSize:10,color:'#64748B'}}>{u.unitId}</div></td>
                  <td><div style={{fontSize:12}}>{u.forest}</div><div style={{fontSize:10,color:'#64748B'}}>{u.district}</div></td>
                  <td style={{fontWeight:600}}>{u.acres.toLocaleString()}</td>
                  <td><span className={`info-pill ${u.status==='Approved'?'pill-green':'pill-orange'}`}>{u.status}</span></td>
                  <td>
                    <div style={{fontWeight:700,color:u.priorityScore>=90?'#FCA5A5':u.priorityScore>=80?'#FCD34D':'#86EFAC'}}>{u.priorityScore}</div>
                    <div style={{fontSize:10,color:'#64748B'}}>{priorityLabel(u.priorityScore)}</div>
                  </td>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <div className="window-bar" style={{width:50}}><div className="window-fill" style={{width:`${Math.min(u.windowPct*3.3,100)}%`}}/></div>
                      <span style={{fontSize:11}}>{u.windowPct}%</span>
                    </div>
                  </td>
                  <td style={{fontSize:11,color:'#94A3B8'}}>{peak}</td>
                  <td>{inW ? <span className="info-pill pill-green">✅ GO</span> : <span className="info-pill pill-gray">⛔</span>}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length === 0 && <div style={{padding:'30px',textAlign:'center',color:'#475569'}}>No units match your filter.</div>}
      </div>
    </div>
  );
}

// ─── Map View ────────────────────────────────────────────────────────────────
function MapView({units, setSelectedUnit, setView}) {
  const mapRef = useRef(null);
  const mapInst = useRef(null);
  useEffect(() => {
    if (mapInst.current) return;
    mapInst.current = L.map(mapRef.current, {center:[37.5,-119.5],zoom:6});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(mapInst.current);
    units.forEach(u => {
      const inW = isInWindow(u);
      const color = inW ? '#22C55E' : u.priorityScore >= 90 ? '#EF4444' : u.priorityScore >= 80 ? '#F59E0B' : '#3B82F6';
      const marker = L.circleMarker([u.lat,u.lon],{radius:10,fillColor:color,color:'#fff',weight:2,fillOpacity:.85}).addTo(mapInst.current);
      marker.bindPopup(`<div style="font-family:sans-serif;padding:4px"><b>${u.name}</b><br>${u.forest}<br>${u.acres} acres<br>Window: ${u.windowPct}%<br>Priority: ${u.priorityScore}<br>${inW?'<b style="color:green">✅ IN WINDOW</b>':'⛔ Not in window'}</div>`);
    });
    return () => { mapInst.current?.remove(); mapInst.current = null; };
  }, []);
  return (
    <div>
      <div className="card" style={{marginBottom:14}}>
        <div style={{display:'flex',gap:16,alignItems:'center',fontSize:12}}>
          <span style={{color:'#64748B'}}>Map Legend:</span>
          {[['#22C55E','In Window'],['#EF4444','Critical Priority'],['#F59E0B','High Priority'],['#3B82F6','Medium Priority']].map(([c,l]) => (
            <div key={l} style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:14,height:14,background:c,borderRadius:'50%'}}/><span style={{color:'#94A3B8'}}>{l}</span></div>
          ))}
          <div className="drag-zone" style={{padding:'8px 14px',fontSize:12,flex:1,maxWidth:280}}>📁 Drop shapefile (.zip) to overlay burn boundaries</div>
        </div>
      </div>
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div ref={mapRef} id="map" style={{height:500,borderRadius:10}}/>
      </div>
    </div>
  );
}

      rx:{tempMin:+form.tempMin,tempMax:+form.tempMax,rhMin:+form.rhMin,rhMax:+form.rhMax,windMin:+form.windMin,windMax:+form.windMax,windDir:form.windDir,
          mixHt:+form.mixHt,transport:+form.transport,fm1Min:+form.fm1Min,fm1Max:+form.fm1Max,fm10Min:+form.fm10Min,fm10Max:+form.fm10Max,
          fm100Max:+form.fm100Max,fm1000Max:+form.fm1000Max,liveFmMin:+form.liveFmMin,hainesMax:+form.hainesMax,ercMin:+form.ercMin,ercMax:+form.ercMax,flameLenMax:+form.flameLenMax},
      smoke:{airBasin:form.airBasin,permitReq:form.permitReq,receptors:form.receptors,mitigation:form.mitigation},
      monthly:monthlyWindow,windowPct:form.targetMonths.length>0?Math.round(monthlyWindow.reduce((s,v)=>s+v,0)/12):5,
      currentCond:{temp:65,rh:40,wind:10,windDir:'SW',fm10:15,fm100:22,haines:3,erc:40,aqi:35,mixHt:2000,transport:14},
    };
    newUnit.priorityScore = calcPriority(newUnit);
    onSave(newUnit);
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-title">Add Burn Unit — PMS 484-1 Plan</div>
        <div className="modal-sub">Complete all elements per the NWCG Prescribed Fire Plan Template (December 2021)</div>
        <div className="step-indicator">{steps.map((_,i) => <div key={i} className={`step ${i<step?'done':i===step?'active':''}`}/>)}</div>
        <div className="step-label">{steps.map((s,i) => <span key={i} style={i===step?{color:'#52B788',fontWeight:700}:{}}>{s}</span>)}</div>

        {step === 0 && (
          <div>
            <div className="section-title">Element 1 & 4 — Unit Identification</div>
            <div className="form-grid" style={{marginBottom:12}}>
              <div className="field"><label>Prescribed Fire Name *</label><input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="e.g. Crane Flat Meadow Rx"/></div>
              <div className="field"><label>Unit ID</label><input value={form.unitId} onChange={e=>set('unitId',e.target.value)} placeholder="e.g. STF-CR-001"/></div>
              <div className="field"><label>Agency</label><select value={form.agency} onChange={e=>set('agency',e.target.value)}><option>USFS</option><option>CAL FIRE</option><option>NPS</option><option>BLM</option><option>BIA</option><option>Local/Tribal</option></select></div>
              <div className="field"><label>National Forest / Administrative Unit *</label><input value={form.forest} onChange={e=>set('forest',e.target.value)} placeholder="e.g. Stanislaus NF"/></div>
              <div className="field"><label>District / Zone</label><input value={form.district} onChange={e=>set('district',e.target.value)} placeholder="e.g. Groveland RD"/></div>
              <div className="field"><label>Acres *</label><input type="number" value={form.acres} onChange={e=>set('acres',e.target.value)} placeholder="245"/></div>
            </div>
            <div className="form-grid-3" style={{marginBottom:12}}>
              <div className="field"><label>Latitude (WGS84)</label><input value={form.lat} onChange={e=>set('lat',e.target.value)} placeholder="37.754"/></div>
              <div className="field"><label>Longitude</label><input value={form.lon} onChange={e=>set('lon',e.target.value)} placeholder="-119.832"/></div>
              <div className="field"><label>Complexity Rating</label><select value={form.complexity} onChange={e=>set('complexity',e.target.value)}><option>Low</option><option>Moderate</option><option>High</option></select></div>
            </div>
            <div className="form-grid" style={{marginBottom:12}}>
              <div className="field"><label>Burn Boss (Name & Qualification)</label><input value={form.burnBoss} onChange={e=>set('burnBoss',e.target.value)} placeholder="Name — RXB2"/></div>
              <div className="field"><label>Plan Status</label><select value={form.status} onChange={e=>set('status',e.target.value)}><option>Pending Review</option><option>Approved</option><option>Draft</option></select></div>
            </div>
          </div>
        )}

        {step === 1 && (
          <div>
            <div className="section-title">Element 4B — Fuels Description</div>
            <div className="field" style={{marginBottom:12}}><label>On-site Fuels / Fuel Model</label><textarea value={form.fuels} onChange={e=>set('fuels',e.target.value)} placeholder="Describe fuel type, fuel model (Anderson 1-13 or SB 40), loading, and conditions..."/></div>
            <div className="section-title">Element 5 — Objectives</div>
            <div className="field"><label>Resource & Prescribed Fire Objectives</label><textarea value={form.objectives} onChange={e=>set('objectives',e.target.value)} rows={4} placeholder="Describe resource management objectives, fire behavior objectives, and how prescribed fire will meet them..."/></div>
          </div>
        )}

        {step === 2 && (
          <div>
            <div className="section-title">Element 7B — Prescription Parameters</div>
            <div className="form-grid-3" style={{marginBottom:8}}>
              <div className="field"><label>Temperature (°F)</label><div className="range-row"><input type="number" value={form.tempMin} onChange={e=>set('tempMin',e.target.value)} placeholder="Min"/><span className="range-sep">–</span><input type="number" value={form.tempMax} onChange={e=>set('tempMax',e.target.value)} placeholder="Max"/></div></div>
              <div className="field"><label>Relative Humidity (%)</label><div className="range-row"><input type="number" value={form.rhMin} onChange={e=>set('rhMin',e.target.value)} placeholder="Min"/><span className="range-sep">–</span><input type="number" value={form.rhMax} onChange={e=>set('rhMax',e.target.value)} placeholder="Max"/></div></div>
              <div className="field"><label>Wind Speed 20ft (mph)</label><div className="range-row"><input type="number" value={form.windMin} onChange={e=>set('windMin',e.target.value)} placeholder="Min"/><span className="range-sep">–</span><input type="number" value={form.windMax} onChange={e=>set('windMax',e.target.value)} placeholder="Max"/></div></div>
              <div className="field"><label>Wind Direction</label><input value={form.windDir} onChange={e=>set('windDir',e.target.value)} placeholder="e.g. SW–NW (210–330°)"/></div>
              <div className="field"><label>1-hr Fuel Moisture (%)</label><div className="range-row"><input type="number" value={form.fm1Min} onChange={e=>set('fm1Min',e.target.value)}/><span className="range-sep">–</span><input type="number" value={form.fm1Max} onChange={e=>set('fm1Max',e.target.value)}/></div></div>
              <div className="field"><label>10-hr Fuel Moisture (%)</label><div className="range-row"><input type="number" value={form.fm10Min} onChange={e=>set('fm10Min',e.target.value)}/><span className="range-sep">–</span><input type="number" value={form.fm10Max} onChange={e=>set('fm10Max',e.target.value)}/></div></div>
              <div className="field"><label>100-hr FM Max (%)</label><input type="number" value={form.fm100Max} onChange={e=>set('fm100Max',e.target.value)}/></div>
              <div className="field"><label>1000-hr FM Max (%)</label><input type="number" value={form.fm1000Max} onChange={e=>set('fm1000Max',e.target.value)}/></div>
              <div className="field"><label>Live FM Min (%)</label><input type="number" value={form.liveFmMin} onChange={e=>set('liveFmMin',e.target.value)}/></div>
              <div className="field"><label>Haines Index Max</label><input type="number" value={form.hainesMax} onChange={e=>set('hainesMax',e.target.value)} min={1} max={6}/></div>
              <div className="field"><label>ERC Range</label><div className="range-row"><input type="number" value={form.ercMin} onChange={e=>set('ercMin',e.target.value)}/><span className="range-sep">–</span><input type="number" value={form.ercMax} onChange={e=>set('ercMax',e.target.value)}/></div></div>
              <div className="field"><label>Mixing Height Min (ft)</label><input type="number" value={form.mixHt} onChange={e=>set('mixHt',e.target.value)}/></div>
              <div className="field"><label>Transport Wind Min (mph)</label><input type="number" value={form.transport} onChange={e=>set('transport',e.target.value)}/></div>
              <div className="field"><label>Max Flame Length (ft)</label><input type="number" value={form.flameLenMax} onChange={e=>set('flameLenMax',e.target.value)}/></div>
            </div>
          </div>
        )}

        {step === 3 && (
          <div>
            <div className="section-title">Element 8 — Scheduling</div>
            <div style={{fontSize:12,color:'#94A3B8',marginBottom:10}}>Select target burn months (used to identify prescription windows):</div>
            <div className="month-checks">
              {MONTHS.map((m,i) => (
                <label key={m} className="month-check" style={{padding:'8px 14px',background:form.targetMonths.includes(i)?'#1B4332':'#152030',borderRadius:20,border:`2px solid ${form.targetMonths.includes(i)?'#52B788':'#2D4057'}`}}>
                  <input type="checkbox" checked={form.targetMonths.includes(i)} onChange={() => toggleMonth(i)} style={{display:'none'}}/>
                  <span style={{color:form.targetMonths.includes(i)?'#52B788':'#94A3B8',fontWeight:600}}>{m}</span>
                </label>
              ))}
            </div>
            <div style={{marginTop:16,fontSize:12,color:'#64748B'}}>Selected: {form.targetMonths.length > 0 ? form.targetMonths.map(i=>MONTHS[i]).join(', ') : 'None — please select at least one month'}</div>
          </div>
        )}

        {step === 4 && (
          <div>
            <div className="section-title">Element 19 — Smoke Management & Air Quality</div>
            <div className="form-grid" style={{marginBottom:12}}>
              <div className="field"><label>Air Basin</label><select value={form.airBasin} onChange={e=>set('airBasin',e.target.value)}>
                <option value="">Select Air Basin</option>
                {['San Joaquin Valley','South Coast','North Coast','Great Basin Valleys','Sacramento Valley','San Francisco Bay Area','Mountain Counties','Lake County','Northeast Plateau'].map(b => <option key={b}>{b}</option>)}
              </select></div>
              <div className="field"><label>Smoke Permit Required</label><select value={form.permitReq} onChange={e=>set('permitReq',e.target.value==='true')}>
                <option value="false">No permit required</option><option value="true">Yes — permit required</option>
              </select></div>
              <div className="field"><label>Smoke-Sensitive Receptors</label><input value={form.receptors} onChange={e=>set('receptors',e.target.value)} placeholder="e.g. Town of X (5 mi), Highway Y"/></div>
              <div className="field"><label>AQI Threshold for No-Go</label><select defaultValue="100"><option value="50">50 — Moderate</option><option value="100">100 — Unhealthy for Sensitive Groups</option><option value="150">150 — Unhealthy</option></select></div>
            </div>
            <div className="field"><label>Smoke Mitigation Strategies (Element 19E)</label><textarea value={form.mitigation} onChange={e=>set('mitigation',e.target.value)} placeholder="Describe strategies to reduce smoke impacts on sensitive receptors..."/></div>
          </div>
        )}

        {step === 5 && (
          <div>
            <div className="section-title">Review — {form.name || 'Unnamed Unit'}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[['Unit Name',form.name||'—'],['Unit ID',form.unitId||'—'],['Agency',form.agency],['Forest',form.forest||'—'],['Acres',form.acres||'—'],['Status',form.status],
                ['Target Months',form.targetMonths.map(i=>MONTHS[i]).join(', ')||'None'],['Air Basin',form.airBasin||'—'],['Permit Required',form.permitReq?'Yes':'No'],
                ['Temp Range',`${form.tempMin}–${form.tempMax}°F`],['RH Range',`${form.rhMin}–${form.rhMax}%`],['Wind Range',`${form.windMin}–${form.windMax} mph`]
              ].map(([l,v]) => (
                <div key={l} style={{padding:'8px',background:'#152030',borderRadius:6,border:'1px solid #1E3448'}}>
                  <div style={{fontSize:10,color:'#64748B'}}>{l}</div>
                  <div style={{fontSize:13,fontWeight:600,color:'#E2E8F0'}}>{v}</div>
                </div>
              ))}
            </div>
            <div className="alert alert-green" style={{marginTop:16}}><span>ℹ️</span>After saving, the system will query 15 years of FEMS data to generate prescription window analysis and priority score.</div>
          </div>
        )}

        <div style={{display:'flex',gap:10,marginTop:24,justifyContent:'space-between'}}>
          <button className="btn btn-outline" onClick={onClose}>Cancel</button>
          <div style={{display:'flex',gap:10}}>
            {step > 0 && <button className="btn btn-outline" onClick={() => setStep(s=>s-1)}>← Back</button>}
            {step < steps.length-1 && <button className="btn btn-primary" onClick={() => setStep(s=>s+1)}>Next →</button>}
            {step === steps.length-1 && <button className="btn btn-primary" onClick={handleSave}>✅ Save Burn Unit</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('dashboard');
  const [units, setUnits] = useState([]);
  const [selectedUnit, setSelectedUnit] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [loading, setLoading] = useState(true);
  const [dbStatus, setDbStatus] = useState('connecting'); // connecting | live | error
  const [saveStatus, setSaveStatus] = useState(null); // null | saving | saved | error
  const [usingSample, setUsingSample] = useState(false);

  useEffect(() => { loadUnits(); }, []);

  async function loadUnits() {
    setLoading(true);
    try {
      const { data, error } = await sb.from('burn_units').select('*').order('priority_score', { ascending: false });
      if (error) throw error;
      if (data && data.length > 0) {
        setUnits(data.map(unitFromDB));
        setUsingSample(false);
      } else {
        // Database is empty — show sample data with a banner
        setUnits(UNITS);
        setUsingSample(true);
      }
      setDbStatus('live');
    } catch(e) {
      console.error('Supabase error:', e);
      setUnits(UNITS);
      setUsingSample(true);
      setDbStatus('error');
    }
    setLoading(false);
  }

  async function saveUnit(u) {
    setSaveStatus('saving');
    try {
      const { error } = await sb.from('burn_units').insert([unitToDB(u)]);
      if (error) throw error;
      setSaveStatus('saved');
      setTimeout(() => setSaveStatus(null), 3000);
      await loadUnits();
    } catch(e) {
      console.error('Save error:', e);
      setSaveStatus('error');
      setTimeout(() => setSaveStatus(null), 4000);
      // Fallback: add locally
      setUnits(prev => [...prev.filter(x => !UNITS.find(s=>s.id===x.id)), {...u, id: Date.now()}]);
    }
  }

  async function deleteUnit(id) {
    if (!window.confirm('Delete this burn unit? This cannot be undone.')) return;
    try {
      const { error } = await sb.from('burn_units').delete().eq('id', id);
      if (error) throw error;
      await loadUnits();
      setView('units');
    } catch(e) {
      alert('Error deleting unit: ' + e.message);
    }
  }

  function handleSetView(v) { setView(v); }
  function handleSelectUnit(u) { setSelectedUnit(u); setView('unit-detail'); }

  if (loading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#0F1923',flexDirection:'column',gap:16}}>
      <div style={{fontSize:48}}>🔥</div>
      <div style={{fontSize:18,fontWeight:700,color:'#52B788'}}>RxFire Planner</div>
      <div style={{fontSize:13,color:'#64748B'}}>Connecting to database...</div>
      <div style={{width:200,height:4,background:'#1E3448',borderRadius:2,overflow:'hidden'}}>
        <div style={{width:'60%',height:'100%',background:'#52B788',borderRadius:2,animation:'pulse 1.5s ease-in-out infinite'}}/>
      </div>
    </div>
  );

  return (
    <div className="app">
      <Sidebar view={view} setView={handleSetView} units={units}/>
      <div className="main">
        <div className="topbar">
          <h2>{{dashboard:'Dashboard',heatmap:'Opportunity Heat Map',calendar:'Burn Calendar',units:'Burn Units',map:'Map View',weather:'Fire Weather',aqi:'Air Quality','unit-detail':'Unit Detail',reports:'Reports'}[view] || 'RxFire Planner'}</h2>

          {/* DB status indicator */}
          <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11}}>
            <span className={`status-dot ${dbStatus==='live'?'green':dbStatus==='error'?'red':'orange'}`}/>
            <span style={{color:'#64748B'}}>{dbStatus==='live'?'DB Live':dbStatus==='error'?'DB Error':'Connecting'}</span>
          </div>
          <button className="btn btn-outline btn-sm" onClick={loadUnits} title="Refresh data from database">🔄 Refresh</button>
          <span style={{fontSize:12,color:'#64748B'}}>📅 Feb 24, 2026</span>
          <button className="btn btn-primary" onClick={() => setShowAdd(true)}>+ Add Burn Unit</button>
          <button className="btn btn-outline">⬇ Export</button>
        </div>

        {/* Banners */}
        {usingSample && dbStatus === 'live' && (
          <div style={{background:'#1C3D5A',borderBottom:'1px solid #2D6A9F',padding:'10px 20px',fontSize:12,color:'#93C5FD',display:'flex',alignItems:'center',gap:10}}>
            <span>ℹ️</span>
            <span>Database is empty — showing sample data. Click <strong>+ Add Burn Unit</strong> to add your first real unit and it will appear for your whole team.</span>
          </div>
        )}
        {dbStatus === 'error' && (
          <div style={{background:'#3B1A1A',borderBottom:'1px solid #7F1D1D',padding:'10px 20px',fontSize:12,color:'#FCA5A5',display:'flex',alignItems:'center',gap:10}}>
            <span>⚠️</span>
            <span>Could not reach database — check your Supabase table is set up (see setup instructions). Showing sample data.</span>
          </div>
        )}
        {saveStatus === 'saving' && (
          <div style={{background:'#1C3D5A',borderBottom:'1px solid #2D6A9F',padding:'8px 20px',fontSize:12,color:'#93C5FD'}}>💾 Saving to database...</div>
        )}
        {saveStatus === 'saved' && (
          <div style={{background:'#14532D',borderBottom:'1px solid #166534',padding:'8px 20px',fontSize:12,color:'#86EFAC'}}>✅ Saved! All team members will see this unit when they refresh.</div>
        )}
        {saveStatus === 'error' && (
          <div style={{background:'#3B1A1A',borderBottom:'1px solid #7F1D1D',padding:'8px 20px',fontSize:12,color:'#FCA5A5'}}>⚠️ Save failed — unit added locally only. Check database connection.</div>
        )}

        <div className="content">
          {view === 'dashboard' && <Dashboard units={units} setView={handleSetView} setSelectedUnit={handleSelectUnit}/>}
          {view === 'heatmap' && <HeatMap units={units} setSelectedUnit={handleSelectUnit} setView={handleSetView}/>}
          {view === 'calendar' && <CalendarView units={units}/>}
          {view === 'units' && <BurnUnitsTable units={units} setSelectedUnit={handleSelectUnit} setView={handleSetView}/>}
          {view === 'unit-detail' && selectedUnit && <UnitDetail unit={selectedUnit} setView={handleSetView} onDelete={deleteUnit}/>}
          {view === 'map' && <MapView units={units} setSelectedUnit={handleSelectUnit} setView={handleSetView}/>}
          {view === 'weather' && <WeatherView units={units}/>}
          {view === 'aqi' && <AQIView units={units}/>}
          {view === 'reports' && (
            <div className="card" style={{textAlign:'center',padding:'60px'}}>
              <div style={{fontSize:40,marginBottom:16}}>📄</div>
              <div style={{fontSize:18,fontWeight:700,color:'#E2E8F0',marginBottom:8}}>Reports</div>
              <div style={{color:'#64748B',fontSize:13,marginBottom:20}}>Export burn season summary, priority rankings, PMS 484-1 plans, and weather window analysis as PDF or Excel.</div>
              <div style={{display:'flex',gap:10,justifyContent:'center'}}>
                <button className="btn btn-primary">📊 Export Season Summary</button>
                <button className="btn btn-outline">📋 Export All PMS 484-1 Plans</button>
                <button className="btn btn-outline">📈 FEMS Window Analysis Report</button>
              </div>
            </div>
          )}
        </div>
      </div>
      {showAdd && <AddUnitModal onClose={() => setShowAdd(false)} onSave={u => { setShowAdd(false); saveUnit(u); }}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
