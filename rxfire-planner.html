// ─── Shapefile parser ─────────────────────────────────────────────────────────
async function parseFileToGeoJSON(file){
  const name=file.name.toLowerCase();
  if(name.endsWith('.zip')){
    const zip=await JSZip.loadAsync(file);
    const entries=Object.values(zip.files);
    const shpEntry=entries.find(f=>f.name.toLowerCase().endsWith('.shp'));
    const dbfEntry=entries.find(f=>f.name.toLowerCase().endsWith('.dbf'));
    if(!shpEntry)throw new Error('No .shp file found in zip');
    const shpBuf=await shpEntry.async('arraybuffer');
    const dbfBuf=dbfEntry?await dbfEntry.async('arraybuffer'):undefined;
    const source=await shapefile.open(shpBuf,dbfBuf);
    const features=[];let result;
    while(!(result=await source.read()).done)features.push(result.value);
    return{type:'FeatureCollection',features};
  }
  if(name.endsWith('.geojson')||name.endsWith('.json'))
    return JSON.parse(await file.text());
  throw new Error('Use .zip (shapefile) or .geojson');
}

// ─── Color helpers ────────────────────────────────────────────────────────────
function hmColor(pct){
  if(!pct)return '#0F1923';
  const stops=[[0,'#1B4332'],[25,'#2D6A4F'],[50,'#40916C'],[75,'#52B788'],[100,'#74C69D']];
  const p=Math.min(100,Math.max(0,pct));
  for(let i=1;i<stops.length;i++){
    if(p<=stops[i][0]){
      const t=(p-stops[i-1][0])/(stops[i][0]-stops[i-1][0]);
      const a=parseInt(stops[i-1][1].slice(1),16),b=parseInt(stops[i][1].slice(1),16);
      const r=Math.round(((a>>16)&255)+(((b>>16)&255)-((a>>16)&255))*t);
      const g=Math.round(((a>>8)&255)+(((b>>8)&255)-((a>>8)&255))*t);
      const bl=Math.round((a&255)+((b&255)-(a&255))*t);
      return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${bl.toString(16).padStart(2,'0')}`;
    }
  }
  return '#74C69D';
}

// ─── Go/No-Go ─────────────────────────────────────────────────────────────────
function goNoGo(u){
  const c=u.currentCond||{},r=u.rx||{};
  return[
    {label:'Temperature',value:`${c.temp||'—'}°F`,ok:c.temp>=r.tempMin&&c.temp<=r.tempMax,target:`${r.tempMin}–${r.tempMax}°F`},
    {label:'Relative Humidity',value:`${c.rh||'—'}%`,ok:c.rh>=r.rhMin&&c.rh<=r.rhMax,target:`${r.rhMin}–${r.rhMax}%`},
    {label:'Wind Speed',value:`${c.wind||'—'} mph`,ok:c.wind>=r.windMin&&c.wind<=r.windMax,target:`${r.windMin}–${r.windMax} mph`},
    {label:'10-hr Fuel Moisture',value:`${c.fm10||'—'}%`,ok:c.fm10<=r.fm10Max,target:`≤${r.fm10Max}%`},
    {label:'100-hr Fuel Moisture',value:`${c.fm100||'—'}%`,ok:c.fm100<=r.fm100Max,target:`≤${r.fm100Max}%`},
    {label:'Haines Index',value:`${c.haines||'—'}`,ok:c.haines<=r.hainesMax,target:`≤${r.hainesMax}`},
    {label:'ERC',value:`${c.erc||'—'}`,ok:c.erc<=r.ercMax,target:`≤${r.ercMax}`},
    {label:'Air Quality Index',value:`${c.aqi||'—'}`,ok:c.aqi<=r.aqiMax,target:`≤${r.aqiMax}`},
  ];
}

  const [drag,setDrag]=useState(false);
  async function handle(file){
    setLoading(true);setErr('');
    try{const gj=await parseFileToGeoJSON(file);onChange(gj,file.name);}
    catch(e){setErr(e.message);}
    finally{setLoading(false);}
  }
  return(
    <div>
      <label className={`drop-zone${drag?' drag-over':''}`}
        onDragOver={e=>{e.preventDefault();setDrag(true);}}
        onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);if(e.dataTransfer.files[0])handle(e.dataTransfer.files[0]);}}>
        {loading?<div style={{color:'#64748B',fontSize:12}}>⏳ Parsing…</div>
          :geojson?<div><div style={{fontSize:18}}>✅</div><div style={{fontSize:12,color:'#52B788',fontWeight:600,marginTop:4}}>Boundary loaded · {geojson.features?geojson.features.length:1} feature(s)</div><div style={{fontSize:10,color:'#64748B',marginTop:2}}>Click or drop to replace</div></div>
          :<div><div style={{fontSize:24,marginBottom:4}}>📐</div><div style={{fontSize:12,color:'#64748B'}}>Drop shapefile (.zip) or GeoJSON</div><div style={{fontSize:10,color:'#475569',marginTop:2}}>Optional — links boundary to this burn plan</div></div>}
        <input type="file" accept=".zip,.geojson,.json" style={{display:'none'}} disabled={loading} onChange={e=>{if(e.target.files[0])handle(e.target.files[0]);e.target.value='';}}/>
      </label>
      {err&&<div style={{marginTop:5,fontSize:11,color:'#F87171'}}>{err}</div>}
      {geojson&&<button className="btn btn-outline btn-sm" style={{marginTop:6,fontSize:10}} onClick={()=>onChange(null,'')}>✕ Remove boundary</button>}
    </div>
  );
}

function MonthlyChart({units}){
  const ref=useRef(null);const chart=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(chart.current)chart.current.destroy();
    const totals=Array(12).fill(0);
    units.forEach(u=>{if(u.monthly)u.monthly.forEach((v,i)=>totals[i]+=v);});
    chart.current=new Chart(ref.current,{type:'bar',
      data:{labels:MONTHS,datasets:[{data:totals,backgroundColor:'#2D6A4F',hoverBackgroundColor:'#52B788',borderRadius:4}]},
      options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748B',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#64748B',font:{size:10}},grid:{color:'#152032'}}},responsive:true,maintainAspectRatio:true}});
    return()=>{if(chart.current)chart.current.destroy();};
  },[units]);
  return <canvas ref={ref} height={140}/>;
}

// ─── Calendar ─────────────────────────────────────────────────────────────────
function CalendarView({units}){
  const [month,setMonth]=useState(new Date().getMonth());
  const [year,setYear]=useState(new Date().getFullYear());
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=new Date();
  const unitsThisMonth=units.filter(u=>u.targetMonths&&u.targetMonths.includes(month+1));
  const windowPct=unitsThisMonth.length?(unitsThisMonth.reduce((s,u)=>s+(u.monthly?u.monthly[month]:0),0)/unitsThisMonth.length):0;
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  return(
    <div className="content">
      <div className="grid-2">
        <div className="card">
          <div className="card-header">
            <button className="btn btn-outline btn-sm" onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}}>‹</button>
            <span style={{fontWeight:700,color:'#E2E8F0'}}>{MONTHS[month]} {year}</span>
            <button className="btn btn-outline btn-sm" onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}}>›</button>
          </div>
          <div className="cal-grid">
            {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div key={d} className="cal-header">{d}</div>)}
            {cells.map((d,i)=>(
              <div key={i} className={`cal-day ${d&&windowPct>15?'has-window':''} ${d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear()?'today':''} ${!d?'other-month':''}`}>
                {d&&<span>{d}</span>}
                {d&&windowPct>15&&<div style={{width:4,height:4,borderRadius:'50%',background:'#52B788',marginTop:1}}/>}
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">Units Targeting {MONTHS[month]}</span></div>
          {unitsThisMonth.length===0&&<div style={{fontSize:12,color:'#64748B',padding:'20px 0',textAlign:'center'}}>No units targeting this month</div>}
          {unitsThisMonth.map(u=>(
            <div key={u.id} style={{padding:'10px 0',borderBottom:'1px solid #152032'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:12,fontWeight:600,color:'#E2E8F0'}}>{u.name}</span>
                <AgencyBadge agency={u.agency}/>
              </div>
              <div style={{fontSize:10,color:'#64748B'}}>{u.forest} · {u.monthly?u.monthly[month]:0}% window</div>
              <div style={{marginTop:5,height:4,background:'#1E3448',borderRadius:2,overflow:'hidden'}}>
                <div style={{width:`${u.monthly?u.monthly[month]:0}%`,height:'100%',background:'#52B788',borderRadius:2}}/>
              </div>
            </div>
          ))}
          <div style={{marginTop:12,padding:'10px 12px',background:'#152032',borderRadius:8}}>
            <div style={{fontSize:11,color:'#64748B',marginBottom:3}}>Avg window — {MONTHS[month]}</div>
            <div style={{fontSize:22,fontWeight:700,color:'#52B788'}}>{Math.round(windowPct)}%</div>
          </div>
        </div>
      </div>
    </div>
  );
}

        <div style={{marginLeft:'auto',fontSize:11,color:'#64748B'}}>{rows.length} unit{rows.length!==1?'s':''}</div>

      <div className="card" style={{padding:0,overflow:'hidden'}}>

                <tr key={u.id} onClick={()=>{setSelectedUnit(u);setView('detail');}}>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:7}}>

// ─── Unit Detail ──────────────────────────────────────────────────────────────

    <div className="content">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>

      {unit.objectives&&<div className="card"><div className="card-title" style={{marginBottom:8}}>Objectives (Element 3)</div><p style={{fontSize:13,color:'#CBD5E1',lineHeight:1.6}}>{unit.objectives}</p></div>}
    </div>
  );
}

// ─── Map View ─────────────────────────────────────────────────────────────────
function MapView({units,setSelectedUnit,setView}){
  const mapRef=useRef(null);const mapInst=useRef(null);
  const markersRef=useRef([]);const polyRef=useRef({});
  const [extraLayers,setExtraLayers]=useState([]);
  const [loadingExtra,setLoadingExtra]=useState(false);
  const [drag,setDrag]=useState(false);
  const ctr=useRef(0);
  const EXTRA_COLORS=['#F59E0B','#60A5FA','#F472B6','#A78BFA','#34D399','#FB923C'];

  useEffect(()=>{
    if(mapInst.current||!mapRef.current)return;
    mapInst.current=L.map(mapRef.current,{center:[37.5,-119.5],zoom:6});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'©OpenStreetMap ©Carto',maxZoom:19}).addTo(mapInst.current);
    return()=>{if(mapInst.current){mapInst.current.remove();mapInst.current=null;}};
  },[]);

  useEffect(()=>{
    if(!mapInst.current)return;
    markersRef.current.forEach(m=>m.remove());markersRef.current=[];
    Object.values(polyRef.current).forEach(l=>l.remove());polyRef.current={};
    units.forEach(u=>{
      const color=agencyMapColor(u.agency);
      const popup=`<div style="font-family:sans-serif;font-size:12px;background:#1C2D3E;color:#E2E8F0;padding:10px;border-radius:6px;min-width:170px">
        <strong style="color:${color}">${u.name}</strong><br/>
        <span style="font-size:10px;color:#94A3B8">${u.agency} · ${u.forest}</span><br/>
        ${u.acres} ac · Priority ${u.priorityScore} · Window ${u.windowPct||0}%<br/>
        <em style="font-size:10px;color:#52B788">Click to open burn plan →</em></div>`;
      if(u.geojson){
        const layer=L.geoJSON(u.geojson,{
          style:{color,weight:2,fillColor:color,fillOpacity:.18},
          onEachFeature:(_,lyr)=>{
            lyr.bindPopup(popup,{className:'dark-popup',maxWidth:230});
            lyr.on('click',()=>{setSelectedUnit(u);setView('detail');});
            lyr.on('mouseover',()=>lyr.setStyle({fillOpacity:.35,weight:3}));
            lyr.on('mouseout',()=>lyr.setStyle({fillOpacity:.18,weight:2}));
          }
        }).addTo(mapInst.current);
        try{const c=layer.getBounds().getCenter();
          const lbl=L.divIcon({html:`<div style="background:${color};color:#0F1923;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;white-space:nowrap">${u.priorityScore}</div>`,className:'',iconAnchor:[16,8]});
          markersRef.current.push(L.marker(c,{icon:lbl,interactive:false}).addTo(mapInst.current));
        }catch(e){}
        polyRef.current[u.id]=layer;
      }else{
        const icon=L.divIcon({html:`<div style="width:11px;height:11px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,.3);box-shadow:0 0 5px ${color}88"></div>`,className:'',iconSize:[11,11],iconAnchor:[5,5]});
        const m=L.marker([u.lat||37.5,u.lon||-119.5],{icon}).addTo(mapInst.current).bindPopup(popup,{className:'dark-popup'});
        m.on('click',()=>{setSelectedUnit(u);setView('detail');});
        markersRef.current.push(m);
      }
    });
  },[units]);

  async function handleExtra(file){
    setLoadingExtra(true);
    try{
      const gj=await parseFileToGeoJSON(file);
      const id=++ctr.current;const color=EXTRA_COLORS[(id-1)%EXTRA_COLORS.length];
      const lyr=L.geoJSON(gj,{
        style:{color,weight:1.5,fillColor:color,fillOpacity:.08,dashArray:'4 4'},
        onEachFeature:(ft,layer)=>{
          if(ft.properties){const props=Object.entries(ft.properties).map(([k,v])=>`<tr><td style="color:#94A3B8;padding:1px 5px">${k}</td><td style="color:#E2E8F0;padding:1px 5px">${v}</td></tr>`).join('');
            layer.bindPopup(`<div style="font-size:11px;background:#1C2D3E;color:#E2E8F0;max-height:180px;overflow-y:auto"><table>${props}</table></div>`,{className:'dark-popup',maxWidth:280});}
          layer.on('mouseover',()=>layer.setStyle({fillOpacity:.2,weight:2.5}));
          layer.on('mouseout',()=>layer.setStyle({fillOpacity:.08,weight:1.5}));
        }
      }).addTo(mapInst.current);
      try{mapInst.current.fitBounds(lyr.getBounds(),{padding:[20,20]});}catch(e){}
      setExtraLayers(prev=>[...prev,{id,name:file.name,color,visible:true,layer:lyr,count:gj.features?gj.features.length:1}]);
    }catch(e){alert('Error: '+e.message);}
    finally{setLoadingExtra(false);}
  }

  function toggleExtra(id){setExtraLayers(prev=>prev.map(l=>{if(l.id===id){l.visible?mapInst.current.removeLayer(l.layer):l.layer.addTo(mapInst.current);return{...l,visible:!l.visible};}return l;}));}
  function removeExtra(id){setExtraLayers(prev=>{const l=prev.find(x=>x.id===id);if(l)mapInst.current.removeLayer(l.layer);return prev.filter(x=>x.id!==id);});}

  return(
    <div style={{flex:1,display:'flex',height:'100%',overflow:'hidden'}}>
      <div style={{width:220,background:'#0A1520',borderRight:'1px solid #1E3448',display:'flex',flexDirection:'column',flexShrink:0,overflowY:'auto'}}>
        <div style={{padding:'12px 14px',borderBottom:'1px solid #1E3448'}}>
          <div style={{fontSize:11,fontWeight:700,color:'#94A3B8',textTransform:'uppercase',letterSpacing:.6,marginBottom:8}}>Burn Units</div>
          {['USFS','CAL FIRE','LG','WFS'].map(a=>(
            <div key={a} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
              <div style={{width:9,height:9,borderRadius:2,background:agencyMapColor(a),flexShrink:0}}/>
              <span style={{fontSize:10,color:'#94A3B8'}}>{a}</span>
            </div>
          ))}
          <div style={{fontSize:10,color:'#475569',marginTop:6}}>📐 polygon = boundary uploaded<br/>• dot = no shapefile yet</div>
          <div style={{fontSize:10,color:'#64748B',marginTop:6}}>To add a boundary: open a unit → Unit Boundary section</div>
        </div>
        <div style={{padding:'12px 14px',borderBottom:'1px solid #1E3448'}}>
          <div style={{fontSize:11,fontWeight:700,color:'#94A3B8',textTransform:'uppercase',letterSpacing:.6,marginBottom:8}}>Background Layers</div>
          <label style={{display:'block'}}>
            <div className="btn btn-outline" style={{width:'100%',textAlign:'center',fontSize:11,cursor:'pointer',marginBottom:4}}>{loadingExtra?'Loading…':'📂 Add Layer'}</div>
            <input type="file" accept=".zip,.geojson,.json" style={{display:'none'}} disabled={loadingExtra} onChange={e=>{if(e.target.files[0])handleExtra(e.target.files[0]);e.target.value='';}}/>
          </label>
          <div style={{fontSize:10,color:'#475569',textAlign:'center'}}>Or drag & drop onto map</div>
        </div>
        <div style={{flex:1,padding:8}}>
          {extraLayers.length===0&&<div style={{padding:'12px 6px',color:'#475569',fontSize:10,textAlign:'center'}}>No background layers</div>}
          {extraLayers.map(l=>(
            <div key={l.id} style={{background:'#1C2D3E',borderRadius:6,padding:'8px 10px',marginBottom:6,opacity:l.visible?1:.5}}>
              <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:3}}>
                <div style={{width:8,height:8,borderRadius:2,background:l.color,flexShrink:0}}/>
                <span style={{fontSize:10,color:'#E2E8F0',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.name}</span>
              </div>
              <div style={{fontSize:9,color:'#64748B',marginBottom:5}}>{l.count} feature{l.count!==1?'s':''}</div>
              <div style={{display:'flex',gap:4}}>
                <button className="btn btn-outline btn-sm" style={{flex:1,fontSize:9,padding:'2px 4px'}} onClick={()=>toggleExtra(l.id)}>{l.visible?'Hide':'Show'}</button>
                <button className="btn btn-danger btn-sm" style={{fontSize:9,padding:'2px 6px'}} onClick={()=>removeExtra(l.id)}>✕</button>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{flex:1,position:'relative'}}
        onDragOver={e=>{e.preventDefault();setDrag(true);}}
        onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDrag(false);}}
        onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)handleExtra(f);}}>
        <div ref={mapRef} style={{width:'100%',height:'100%'}}/>
        {drag&&<div style={{position:'absolute',inset:0,background:'rgba(82,183,136,.1)',border:'3px dashed #52B788',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8,pointerEvents:'none'}}>
          <div style={{fontSize:40}}>📁</div><div style={{fontSize:14,fontWeight:700,color:'#52B788'}}>Drop to add background layer</div>
        </div>}
      </div>
    </div>
  );
}

// ─── Weather View ─────────────────────────────────────────────────────────────

  const [sel,setSel]=useState(units[0]||null);
  useEffect(()=>{if(!sel&&units.length)setSel(units[0]);},[units]);

  const c=sel.currentCond||{};const r=sel.rx||{};
  return(
    <div className="content">
      <div style={{marginBottom:14}}>
        <select className="form-select" style={{maxWidth:320}} value={sel.id} onChange={e=>setSel(units.find(u=>u.id===e.target.value))}>
          {units.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}

      </div>
      <div className="grid-4" style={{marginBottom:16}}>
        {[{label:'Temperature',val:`${c.temp||'—'}°F`,range:`${r.tempMin}–${r.tempMax}°F`,ok:c.temp>=r.tempMin&&c.temp<=r.tempMax,icon:'🌡️'},

            <div style={{fontSize:20,marginBottom:6}}>{item.icon}</div>
            <div className="card-title">{item.label}</div>
            <div className="stat-value" style={{fontSize:22,marginTop:4,color:item.ok?'#52B788':'#F87171'}}>{item.val}</div>
            <div className="stat-sub">Target: {item.range}</div>
          </div>
        ))}
      </div>
      <div className="grid-2">
        <div className="card"><div className="card-header"><span className="card-title">Fuel Moisture</span></div>
          {[{label:'10-hr FM',val:c.fm10,max:r.fm10Max},{label:'100-hr FM',val:c.fm100,max:r.fm100Max}].map(item=>(
            <div key={item.label} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:12,color:'#94A3B8'}}>{item.label}</span><span style={{fontSize:12,fontWeight:700,color:item.val<=item.max?'#52B788':'#F87171'}}>{item.val||'—'}% / ≤{item.max}%</span></div>
              <div style={{height:5,background:'#1E3448',borderRadius:3,overflow:'hidden'}}><div style={{width:`${Math.min(100,(item.val/item.max)*100)}%`,height:'100%',background:item.val<=item.max?'#52B788':'#F87171',borderRadius:3}}/></div>
            </div>
          ))}
        </div>
        <div className="card"><div className="card-header"><span className="card-title">Fire Indices</span></div>
          {[{label:'Haines Index',val:c.haines,max:r.hainesMax},{label:'ERC',val:c.erc,max:r.ercMax}].map(item=>(
            <div key={item.label} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:12,color:'#94A3B8'}}>{item.label}</span><span style={{fontSize:12,fontWeight:700,color:item.val<=item.max?'#52B788':'#F87171'}}>{item.val||'—'} / ≤{item.max}</span></div>
              <div style={{height:5,background:'#1E3448',borderRadius:3,overflow:'hidden'}}><div style={{width:`${Math.min(100,(item.val/item.max)*100)}%`,height:'100%',background:item.val<=item.max?'#52B788':'#F87171',borderRadius:3}}/></div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── AQI View ─────────────────────────────────────────────────────────────────
function AQIView({units}){
  const sorted=[...units].sort((a,b)=>((b.currentCond||{}).aqi||0)-((a.currentCond||{}).aqi||0));
  function aqiColor(v){return v<=50?'#52B788':v<=100?'#FCD34D':v<=150?'#FB923C':'#F87171';}
  function aqiLabel(v){return v<=50?'Good':v<=100?'Moderate':v<=150?'USG':'Unhealthy';}
  return(
    <div className="content">
      <div className="card">
        <div className="card-header"><span className="card-title">Air Quality Index — All Units</span></div>
        {sorted.map(u=>{const aqi=(u.currentCond||{}).aqi||0;const maxAqi=(u.rx||{}).aqiMax||100;
          return(<div key={u.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid #152032'}}>
            <div style={{width:38,height:38,borderRadius:8,background:aqiColor(aqi),display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#0F1923',flexShrink:0}}>{aqi}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:'#E2E8F0'}}>{u.name}</div>
              <div style={{fontSize:10,color:'#64748B'}}>{aqiLabel(aqi)}</div>
              <div style={{marginTop:3,height:3,background:'#1E3448',borderRadius:2,overflow:'hidden'}}><div style={{width:`${Math.min(100,(aqi/200)*100)}%`,height:'100%',background:aqiColor(aqi),borderRadius:2}}/></div>
            </div>
            <div style={{textAlign:'right',fontSize:11}}><div style={{color:'#64748B'}}>Rx max</div><div style={{fontWeight:700,color:aqi<=maxAqi?'#52B788':'#F87171'}}>≤{maxAqi}</div></div>
          </div>);
        })}
      </div>
    </div>
  );
}

      <div className="form-row"><div className="form-group"><label className="form-label">Temp Min °F</label><input className="form-input" type="number" value={form.tempMin} onChange={e=>u('tempMin',e.target.value)}/></div><div className="form-group"><label className="form-label">Temp Max °F</label><input className="form-input" type="number" value={form.tempMax} onChange={e=>u('tempMax',e.target.value)}/></div></div>
      <div className="form-row"><div className="form-group"><label className="form-label">RH Min %</label><input className="form-input" type="number" value={form.rhMin} onChange={e=>u('rhMin',e.target.value)}/></div><div className="form-group"><label className="form-label">RH Max %</label><input className="form-input" type="number" value={form.rhMax} onChange={e=>u('rhMax',e.target.value)}/></div></div>
      <div className="form-row-3"><div className="form-group"><label className="form-label">Wind Min mph</label><input className="form-input" type="number" value={form.windMin} onChange={e=>u('windMin',e.target.value)}/></div><div className="form-group"><label className="form-label">Wind Max mph</label><input className="form-input" type="number" value={form.windMax} onChange={e=>u('windMax',e.target.value)}/></div><div className="form-group"><label className="form-label">Wind Dir</label><input className="form-input" value={form.windDir} onChange={e=>u('windDir',e.target.value)}/></div></div>
      <div className="form-row"><div className="form-group"><label className="form-label">10-hr FM Max %</label><input className="form-input" type="number" value={form.fm10Max} onChange={e=>u('fm10Max',e.target.value)}/></div><div className="form-group"><label className="form-label">100-hr FM Max %</label><input className="form-input" type="number" value={form.fm100Max} onChange={e=>u('fm100Max',e.target.value)}/></div></div>
      <div className="form-row-3"><div className="form-group"><label className="form-label">Haines Max</label><input className="form-input" type="number" value={form.hainesMax} onChange={e=>u('hainesMax',e.target.value)}/></div><div className="form-group"><label className="form-label">ERC Max</label><input className="form-input" type="number" value={form.ercMax} onChange={e=>u('ercMax',e.target.value)}/></div><div className="form-group"><label className="form-label">AQI Max</label><input className="form-input" type="number" value={form.aqiMax} onChange={e=>u('aqiMax',e.target.value)}/></div></div>
      <div className="form-row"><div className="form-group"><label className="form-label">Mix Height Min ft</label><input className="form-input" type="number" value={form.mixHgtMin} onChange={e=>u('mixHgtMin',e.target.value)}/></div><div className="form-group"><label className="form-label">Transport Wind Min mph</label><input className="form-input" type="number" value={form.transportMin} onChange={e=>u('transportMin',e.target.value)}/></div></div>
    </div>,
    // 3 Smoke & Conditions
    <div key="3">
      <div style={{marginBottom:10,fontSize:11,color:'#64748B'}}>Smoke Management (Element 19) &amp; Current Conditions</div>
      <div className="form-row-3">
        <div className="form-group"><label className="form-label">Smoke Class</label><select className="form-select" value={form.sClass} onChange={e=>u('sClass',e.target.value)}>{['I','II','III','IV','V'].map(s=><option key={s}>{s}</option>)}</select></div>
        <div className="form-group"><label className="form-label">Dispersal</label><select className="form-select" value={form.dispersal} onChange={e=>u('dispersal',e.target.value)}>{['Good','Moderate','Poor'].map(s=><option key={s}>{s}</option>)}</select></div>
        <div className="form-group"><label className="form-label">Transport Wind</label><input className="form-input" value={form.transportWind} onChange={e=>u('transportWind',e.target.value)} placeholder="SW"/></div>
      </div>
      <div style={{borderTop:'1px solid #1E3448',paddingTop:12,marginBottom:10,fontSize:11,color:'#64748B'}}>Current Conditions (for Go/No-Go)</div>
      <div className="form-row"><div className="form-group"><label className="form-label">Temp °F</label><input className="form-input" type="number" value={form.temp} onChange={e=>u('temp',e.target.value)}/></div><div className="form-group"><label className="form-label">RH %</label><input className="form-input" type="number" value={form.rh} onChange={e=>u('rh',e.target.value)}/></div></div>
      <div className="form-row"><div className="form-group"><label className="form-label">Wind mph</label><input className="form-input" type="number" value={form.wind} onChange={e=>u('wind',e.target.value)}/></div><div className="form-group"><label className="form-label">AQI</label><input className="form-input" type="number" value={form.aqi} onChange={e=>u('aqi',e.target.value)}/></div></div>
      <div className="form-row"><div className="form-group"><label className="form-label">10-hr FM %</label><input className="form-input" type="number" value={form.fm10} onChange={e=>u('fm10',e.target.value)}/></div><div className="form-group"><label className="form-label">100-hr FM %</label><input className="form-input" type="number" value={form.fm100} onChange={e=>u('fm100',e.target.value)}/></div></div>
      <div className="form-row"><div className="form-group"><label className="form-label">Haines</label><input className="form-input" type="number" value={form.haines} onChange={e=>u('haines',e.target.value)}/></div><div className="form-group"><label className="form-label">ERC</label><input className="form-input" type="number" value={form.erc} onChange={e=>u('erc',e.target.value)}/></div></div>
    </div>,
    // 4 Scheduling
    <div key="4">
      <div style={{marginBottom:12,fontSize:11,color:'#64748B'}}>Select target burn months based on historical weather windows.</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
        {MONTHS.map((m,i)=>(
          <div key={m} onClick={()=>toggleMonth(i+1)} style={{padding:'10px 8px',borderRadius:6,border:`2px solid ${form.targetMonths.includes(i+1)?'#52B788':'#2D4057'}`,background:form.targetMonths.includes(i+1)?'#1B4332':'#152032',cursor:'pointer',textAlign:'center',fontSize:13,fontWeight:600,color:form.targetMonths.includes(i+1)?'#52B788':'#64748B',transition:'all .15s'}}>{m}</div>
        ))}
      </div>
      <div style={{marginTop:12,padding:'10px 12px',background:'#152032',borderRadius:8,fontSize:12,color:'#94A3B8'}}>
        {form.targetMonths.length===0?'No months selected.':form.targetMonths.map(m=>MONTHS[m-1]).join(', ')}
      </div>
    </div>,
    // 5 Review
    <div key="5">
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        {[['Unit Name',form.name||'—'],['Unit ID',form.unitId||'—'],['Agency',form.agency],['Forest',form.forest||'—'],
          ['District',form.district||'—'],['Acres',form.acres||'—'],['Status',form.status],['Complexity',form.complexity],
          ['Burn Boss',form.burnBoss||'—'],['Temp Range',`${form.tempMin}–${form.tempMax}°F`],
          ['RH Range',`${form.rhMin}–${form.rhMax}%`],['Wind',`${form.windMin}–${form.windMax} mph`],
          ['Boundary',form.geojson?`✓ ${form.geojsonName}`:'None (dot on map)'],
          ['Target Months',form.targetMonths.map(m=>MONTHS[m-1]).join(', ')||'None'],
          ['Est. Priority',calcPriority().priorityScore],
        ].map(([k,v])=>(
          <div key={k} style={{padding:'6px 10px',background:'#152032',borderRadius:4}}>
            <div style={{fontSize:10,color:'#64748B',marginBottom:1}}>{k}</div>
            <div style={{fontSize:12,color:k==='Boundary'&&form.geojson?'#52B788':'#E2E8F0',fontWeight:600}}>{v}</div>
          </div>
        ))}
      </div>
    </div>
  ];

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target.className==='modal-overlay')onClose();}}>
      <div className="modal">
        <div className="modal-header"><h3>Add Burn Unit — PMS 484-1</h3><button className="btn btn-outline btn-sm" onClick={onClose}>✕</button></div>
        <div className="modal-body">
          <div className="step-indicator">{STEPS.map((_,i)=><div key={i} className={`step-dot ${i===step?'active':i<step?'done':''}`}/>)}</div>
          <div style={{marginBottom:12,fontSize:12,color:'#94A3B8',fontWeight:600}}>{STEPS[step]}</div>
          {steps[step]}
        </div>
        <div className="modal-footer">
          <div style={{fontSize:11,color:'#64748B'}}>Step {step+1} of {STEPS.length}</div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {step>0&&<button className="btn btn-outline" onClick={()=>setStep(s=>s-1)}>Back</button>}
            {step<STEPS.length-1&&<button className="btn btn-primary" onClick={()=>setStep(s=>s+1)}>Next →</button>}
            {step===STEPS.length-1&&(
              <button className="btn btn-primary" onClick={submit} disabled={!form.name||saving}>
                {saving?'Saving…':'Save Unit'}
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState('dashboard');
  const [units,setUnits]=useState([]);
  const [usingSample,setUsingSample]=useState(false);
  const [selectedUnit,setSelectedUnit]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [savingUnit,setSavingUnit]=useState(false);
  const [toasts,setToasts]=useState([]);
  const [realtimeOk,setRealtimeOk]=useState(false);
  const toastId=useRef(0);

  function toast(t){const id=++toastId.current;setToasts(p=>[...p,{...t,id}]);setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),5000);}

  useEffect(()=>{
    async function load(){
      try{
        const{data,error}=await sb.from('burn_units').select('*').order('priority_score',{ascending:false});
        if(error){console.warn('Supabase error:',error.message);setUnits(SAMPLE);setUsingSample(true);return;}
        if(!data||data.length===0){setUnits(SAMPLE);setUsingSample(true);}
        else{setUnits(data.map(unitFromDB));setUsingSample(false);}
      }catch(e){console.warn('Load failed:',e);setUnits(SAMPLE);setUsingSample(true);}
    }
    load();

    const ch=sb.channel('burn_unit_changes')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'burn_units'},p=>{
        const nu=unitFromDB(p.new);
        setUnits(prev=>{if(prev.find(x=>x.id===nu.id))return prev;return[...prev,nu].sort((a,b)=>(b.priorityScore||0)-(a.priorityScore||0));});
        setUsingSample(false);
        toast({title:'Unit added',msg:nu.name,icon:'🔥',type:'green'});
      })
      .on('postgres_changes',{event:'DELETE',schema:'public',table:'burn_units'},p=>{
        setUnits(prev=>prev.filter(u=>u.id!==p.old.id));
        toast({title:'Unit removed',msg:p.old.name,icon:'🗑️',type:'orange'});
      })
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'burn_units'},p=>{
        const nu=unitFromDB(p.new);
        setUnits(prev=>prev.map(x=>x.id===nu.id?nu:x));
        setSelectedUnit(prev=>prev&&prev.id===nu.id?nu:prev);
      })
      .subscribe(s=>setRealtimeOk(s==='SUBSCRIBED'));
    return()=>{sb.removeChannel(ch);};
  },[]);

  // ── Save new unit ────────────────────────────────────────────────────────────
  async function saveUnit(data){
    setSavingUnit(true);
    // Always add to local state immediately so user sees it right away
    const localId='local-'+Date.now();
    const localUnit={...data,id:localId};
    setUnits(prev=>[localUnit,...prev].sort((a,b)=>(b.priorityScore||0)-(a.priorityScore||0)));
    setShowAdd(false);
    toast({title:'Unit added',msg:data.name,icon:'🔥',type:'green'});

    if(!usingSample){
      // Try to persist to Supabase (first without geojson in case column missing)
      try{
        const row=unitToDB(data,true);// try with geojson
        const{data:saved,error}=await sb.from('burn_units').insert([row]).select().single();
        if(error){
          if(error.message&&error.message.includes('geojson')){
            // geojson column doesn't exist yet — retry without it
            const row2=unitToDB(data,false);
            const{data:saved2,error:err2}=await sb.from('burn_units').insert([row2]).select().single();
            if(err2)throw err2;
            // replace local entry with real DB id
            if(saved2){
              const realUnit=unitFromDB(saved2);
              setUnits(prev=>prev.map(u=>u.id===localId?realUnit:u));
            }
            toast({title:'Tip',msg:'Add geojson column to Supabase to save boundaries (see README)',icon:'ℹ️',type:'orange'});
          }else throw error;
        }else if(saved){
          // replace temp local id with real DB uuid
          const realUnit=unitFromDB(saved);
          setUnits(prev=>prev.map(u=>u.id===localId?realUnit:u));
        }
      }catch(e){
        console.error('Supabase insert failed:',e);
        toast({title:'DB save failed — unit saved locally only',msg:e.message,icon:'⚠️',type:'red'});
      }
    }
    setSavingUnit(false);
  }

  // ── Update status ────────────────────────────────────────────────────────────
  async function updateStatus(id,status){
    setUnits(prev=>prev.map(u=>u.id===id?{...u,status}:u));
    if(id.startsWith('local')||id.startsWith('s'))return;
    try{
      await sb.from('burn_units').update({status}).eq('id',id);
      toast({title:'Status updated',msg:status,icon:'✅',type:'green'});
    }catch(e){toast({title:'Update failed',msg:e.message,icon:'⚠️',type:'red'});}
  }

  // ── Update boundary ──────────────────────────────────────────────────────────
  async function updateBoundary(id,geojson){
    setUnits(prev=>prev.map(u=>u.id===id?{...u,geojson}:u));
    setSelectedUnit(prev=>prev&&prev.id===id?{...prev,geojson}:prev);
    if(id.startsWith('local')||id.startsWith('s')){
      toast({title:geojson?'Boundary saved (local)':'Boundary removed',icon:'📐',type:'green'});return;
    }
    try{
      await sb.from('burn_units').update({geojson}).eq('id',id);
      toast({title:geojson?'Boundary saved':'Boundary removed',msg:geojson?`${geojson.features?geojson.features.length:1} feature(s)`:'',icon:'📐',type:'green'});
    }catch(e){
      if(e.message&&e.message.includes('geojson'))
        toast({title:'geojson column missing',msg:'Run: ALTER TABLE burn_units ADD COLUMN geojson jsonb',icon:'⚠️',type:'red'});
      else toast({title:'Save failed',msg:e.message,icon:'⚠️',type:'red'});
    }
  }

  // ── Delete unit ──────────────────────────────────────────────────────────────
  async function deleteUnit(id){
    setUnits(prev=>prev.filter(u=>u.id!==id));
    if(id.startsWith('local')||id.startsWith('s'))return;
    try{await sb.from('burn_units').delete().eq('id',id);}
    catch(e){toast({title:'Delete failed',msg:e.message,icon:'⚠️',type:'red'});}
  }

  const NAV=[
    {id:'dashboard',icon:'📊',label:'Dashboard'},
    {id:'heatmap',icon:'🌡️',label:'Heat Map'},
    {id:'calendar',icon:'📅',label:'Calendar'},
    {id:'units',icon:'🔥',label:'Burn Units',badge:units.length},
    {id:'map',icon:'🗺️',label:'Map View'},
    {id:'weather',icon:'💨',label:'Weather'},
    {id:'aqi',icon:'🌫️',label:'Air Quality'},
  ];

  const content=()=>{
    if(view==='detail'&&selectedUnit)return<UnitDetail unit={selectedUnit} onBack={()=>setView('units')} onStatusChange={updateStatus} onBoundaryChange={updateBoundary}/>;
    if(view==='heatmap')return<HeatMap units={units}/>;
    if(view==='calendar')return<CalendarView units={units}/>;
    if(view==='units')return<BurnUnitsTable units={units} setSelectedUnit={setSelectedUnit} setView={setView} onDelete={deleteUnit}/>;
    if(view==='map')return<MapView units={units} setSelectedUnit={setSelectedUnit} setView={setView}/>;
    if(view==='weather')return<WeatherView units={units}/>;
    if(view==='aqi')return<AQIView units={units}/>;
    return<Dashboard units={units} setView={setView} setSelectedUnit={setSelectedUnit}/>;
  };

  return(
    <div className="app">
      <div className="sidebar">
        <div className="logo"><h1>🔥 RxFire Planner</h1><p>California Prescribed Fire Scheduling</p></div>
        <nav className="nav">
          <div className="nav-section">Planning</div>
          {NAV.map(n=>(
            <div key={n.id} className={`nav-item ${view===n.id||(view==='detail'&&n.id==='units')?'active':''}`}
              onClick={()=>{setView(n.id);setSelectedUnit(null);}}>
              <span className="icon">{n.icon}</span><span>{n.label}</span>
              {n.badge!=null&&<span className={`badge ${n.id==='units'&&units.filter(u=>u.status==='Planned'||u.status==='Draft').length>0?'orange':''}`}>{n.badge}</span>}
            </div>
          ))}
        </nav>
        <div className="agency-info">
          <strong>Pacific SW Region · California</strong>
          <div style={{marginTop:4,display:'flex',alignItems:'center',gap:6}}>
            {realtimeOk?<><div className="realtime-dot"/><span>Live Sync Active</span></>:<span style={{color:'#475569'}}>⚡ Sample Data</span>}
          </div>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <h2>{view==='detail'&&selectedUnit?selectedUnit.name:NAV.find(n=>n.id===view)?.label||'Dashboard'}</h2>
          {usingSample&&<div style={{fontSize:11,color:'#475569',padding:'3px 10px',background:'#152032',borderRadius:6,border:'1px solid #1E3448'}}>📋 Sample data</div>}
          {(view==='units'||view==='dashboard')&&<button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(true)}>+ Add Unit</button>}
        </div>
        {view==='map'?<div style={{flex:1,display:'flex',overflow:'hidden'}}>{content()}</div>:content()}
      </div>
      {showAdd&&<AddUnitModal onClose={()=>setShowAdd(false)} onSave={saveUnit} saving={savingUnit}/>}
      <ToastContainer toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<style>
.dark-popup .leaflet-popup-content-wrapper{background:#1C2D3E;border:1px solid #2D4057;color:#E2E8F0;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.dark-popup .leaflet-popup-tip{background:#1C2D3E;}
</style>
</body>
</html>
