function hmColor(pct){
  if(pct===0)return '#0F1923';
  const stops=[[0,'#1B4332'],[25,'#2D6A4F'],[50,'#40916C'],[75,'#52B788'],[100,'#74C69D']];
  const p=Math.min(100,Math.max(0,pct));
  for(let i=1;i<stops.length;i++){
    if(p<=stops[i][0]){
      const t=(p-stops[i-1][0])/(stops[i][0]-stops[i-1][0]);
      return lerpColor(stops[i-1][1],stops[i][1],t);
    }
  }
  return stops[stops.length-1][1];
}
function lerpColor(a,b,t){
  const ah=parseInt(a.slice(1),16),bh=parseInt(b.slice(1),16);
  const ar=(ah>>16)&0xff,ag=(ah>>8)&0xff,ab=ah&0xff;
  const br=(bh>>16)&0xff,bg=(bh>>8)&0xff,bb=bh&0xff;
  const r=Math.round(ar+(br-ar)*t),g=Math.round(ag+(bg-ag)*t),bl=Math.round(ab+(bb-ab)*t);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${bl.toString(16).padStart(2,'0')}`;
}

                <div style={{fontSize:10,color:'#64748B'}}>{u.forest} · {u.acres} ac · {u.windowPct}% window</div>

              <div style={{textAlign:'right'}}>

        </div>
      </div>
      <div className="card">
        <div className="card-header"><span className="card-title">Go / No-Go Summary — Current Conditions</span></div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
          {sorted.slice(0,6).map(u=>{
            const checks=goNoGo(u);
            const pass=checks.filter(c=>c.ok).length;
            return(
              <div key={u.id} onClick={()=>{setSelectedUnit(u);setView('detail');}} style={{background:'#152032',borderRadius:8,padding:12,cursor:'pointer',border:`1px solid ${pass===checks.length?'#2D6A4F':pass>=checks.length*0.7?'#78350F':'#7F1D1D'}`}}>

}

function MonthlyBarChart({units}){
  const canvasRef=useRef(null);
  const chartRef=useRef(null);
  useEffect(()=>{
    if(!canvasRef.current)return;
    if(chartRef.current)chartRef.current.destroy();
    const totals=Array(12).fill(0);
    units.forEach(u=>{if(u.monthly)u.monthly.forEach((v,i)=>totals[i]+=v);});
    chartRef.current=new Chart(canvasRef.current,{
      type:'bar',
      data:{labels:MONTHS,datasets:[{data:totals,backgroundColor:'#2D6A4F',hoverBackgroundColor:'#52B788',borderRadius:4}]},
      options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748B',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#64748B',font:{size:10}},grid:{color:'#152032'}}},responsive:true,maintainAspectRatio:true}
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[units]);
  return <canvas ref={canvasRef} height={140}/>;
}

// ─── Calendar ─────────────────────────────────────────────────────────────────
function CalendarView({units}){
  const [month,setMonth]=useState(()=>new Date().getMonth());
  const [year,setYear]=useState(()=>new Date().getFullYear());
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=new Date();
  const unitsThisMonth=units.filter(u=>u.targetMonths&&u.targetMonths.includes(month+1));
  const windowPct=units.length?(units.reduce((s,u)=>{
    if(u.targetMonths&&u.targetMonths.includes(month+1))return s+(u.monthly?u.monthly[month]:0);
    return s;
  },0)/Math.max(1,unitsThisMonth.length)):0;
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push({day:null});
  for(let d=1;d<=daysInMonth;d++)cells.push({day:d});
  return(
    <div className="content">
      <div className="grid-2">
        <div className="card">
          <div className="card-header">
            <button className="btn btn-outline btn-sm" onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}}>‹</button>
            <span style={{fontWeight:700,color:'#E2E8F0'}}>{MONTHS[month]} {year}</span>
            <button className="btn btn-outline btn-sm" onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}}>›</button>
          </div>
          <div className="cal-grid">
            {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div key={d} className="cal-header">{d}</div>)}
            {cells.map((c,i)=>(
              <div key={i} className={`cal-day ${c.day&&windowPct>15?'has-window':''} ${c.day===today.getDate()&&month===today.getMonth()&&year===today.getFullYear()?'today':''} ${!c.day?'other-month':''}`}>
                {c.day&&<span style={{fontSize:11}}>{c.day}</span>}
                {c.day&&windowPct>15&&<div style={{width:4,height:4,borderRadius:'50%',background:'#52B788',marginTop:1}}/>}
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">Units Targeting {MONTHS[month]}</span></div>
          {unitsThisMonth.length===0&&<div style={{fontSize:12,color:'#64748B',padding:'20px 0',textAlign:'center'}}>No units targeting this month</div>}
          {unitsThisMonth.map(u=>(
            <div key={u.id} style={{padding:'10px 0',borderBottom:'1px solid #152032'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <span style={{fontSize:12,fontWeight:600,color:'#E2E8F0'}}>{u.name}</span>
                <span className={`pill ${u.status==='Ready'?'pill-green':u.status==='Approved'?'pill-blue':'pill-yellow'}`}>{u.status}</span>
              </div>
              <div style={{fontSize:10,color:'#64748B'}}>{u.forest} · {u.acres} ac · {u.monthly?u.monthly[month]:0}% window this month</div>
              <div style={{marginTop:6,height:4,background:'#1E3448',borderRadius:2,overflow:'hidden'}}>
                <div style={{width:`${u.monthly?u.monthly[month]:0}%`,height:'100%',background:'#52B788',borderRadius:2}}/>
              </div>
            </div>
          ))}
          <div style={{marginTop:14,padding:'10px 12px',background:'#152032',borderRadius:8}}>
            <div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Avg window for {MONTHS[month]}</div>
            <div style={{fontSize:22,fontWeight:700,color:'#52B788'}}>{Math.round(windowPct)}%</div>
            <div style={{fontSize:10,color:'#64748B'}}>of days historically in-prescription</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Go / No-Go logic ─────────────────────────────────────────────────────────
function goNoGo(unit){
  const c=unit.currentCond||{};
  const r=unit.rx||{};
  return[
    {label:'Temperature',value:`${c.temp||'—'}°F`,ok:c.temp>=r.tempMin&&c.temp<=r.tempMax,target:`${r.tempMin}–${r.tempMax}°F`},
    {label:'Relative Humidity',value:`${c.rh||'—'}%`,ok:c.rh>=r.rhMin&&c.rh<=r.rhMax,target:`${r.rhMin}–${r.rhMax}%`},
    {label:'Wind Speed',value:`${c.wind||'—'} mph`,ok:c.wind>=r.windMin&&c.wind<=r.windMax,target:`${r.windMin}–${r.windMax} mph`},
    {label:'10-hr Fuel Moisture',value:`${c.fm10||'—'}%`,ok:c.fm10<=r.fm10Max,target:`≤${r.fm10Max}%`},
    {label:'100-hr Fuel Moisture',value:`${c.fm100||'—'}%`,ok:c.fm100<=r.fm100Max,target:`≤${r.fm100Max}%`},
    {label:'Haines Index',value:`${c.haines||'—'}`,ok:c.haines<=r.hainesMax,target:`≤${r.hainesMax}`},
    {label:'Energy Release Comp.',value:`${c.erc||'—'}`,ok:c.erc<=r.ercMax,target:`≤${r.ercMax}`},
    {label:'Air Quality Index',value:`${c.aqi||'—'}`,ok:c.aqi<=r.aqiMax,target:`≤${r.aqiMax}`},
  ];
}

// ─── Unit Detail ──────────────────────────────────────────────────────────────
function UnitDetail({unit,onBack,onStatusChange}){
  const [status,setStatus]=useState(unit.status);
  const [saving,setSaving]=useState(false);
  const checks=goNoGo({...unit,status});
  const pass=checks.filter(c=>c.ok).length;
  const isGo=pass===checks.length;
  async function handleStatusChange(newStatus){
    setStatus(newStatus);
    setSaving(true);
    try{await onStatusChange(unit.id,newStatus);}finally{setSaving(false);}
  }
  return(
    <div className="content">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button className="btn btn-outline btn-sm" onClick={onBack}>← Back</button>

        <div style={{display:'flex',alignItems:'center',gap:6}}>

  const [shapeLayers,setShapeLayers]=useState([]);
  const [loadingShape,setLoadingShape]=useState(false);
  const [dragOver,setDragOver]=useState(false);
  const layerCounter=useRef(0);
  const LAYER_COLORS=['#52B788','#F59E0B','#60A5FA','#F472B6','#A78BFA','#34D399','#FB923C','#E879F9'];

  useEffect(()=>{
    if(mapInst.current||!mapRef.current)return;
    mapInst.current=L.map(mapRef.current,{center:[37.5,-119.5],zoom:6});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
      attribution:'©OpenStreetMap ©Carto',maxZoom:19
    }).addTo(mapInst.current);
    return()=>{if(mapInst.current){mapInst.current.remove();mapInst.current=null;}};
  },[]);

  useEffect(()=>{
    if(!mapInst.current)return;
    markersRef.current.forEach(m=>m.remove());
    markersRef.current=[];
    units.forEach(u=>{
      if(!u.lat||!u.lon)return;
      const score=u.priorityScore||0;
      const color=score>=80?'#52B788':score>=60?'#F59E0B':'#60A5FA';
      const icon=L.divIcon({
        html:`<div style="width:12px;height:12px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,.4);box-shadow:0 0 6px ${color}88;"></div>`,
        className:'',iconSize:[12,12],iconAnchor:[6,6]
      });
      const m=L.marker([u.lat,u.lon],{icon}).addTo(mapInst.current)
        .bindPopup(`<div style="font-family:sans-serif;font-size:12px;background:#1C2D3E;color:#E2E8F0;padding:8px;border-radius:6px;min-width:160px">
          <strong style="color:#52B788">${u.name}</strong><br/>
          ${u.forest}<br/>
          ${u.acres} acres · Priority: ${score}<br/>
          Window: ${u.windowPct||0}%
        </div>`,{className:'dark-popup'});
      m.on('click',()=>{setSelectedUnit(u);setView('detail');});
      markersRef.current.push(m);
    });
  },[units]);

  async function handleFile(file){
    if(!mapInst.current||!file)return;
    setLoadingShape(true);
    try{
      const name=file.name.toLowerCase();
      let geojson=null;
      if(name.endsWith('.zip')){
        const zip=await JSZip.loadAsync(file);
        const entries=Object.values(zip.files);
        const shpEntry=entries.find(f=>f.name.toLowerCase().endsWith('.shp'));
        const dbfEntry=entries.find(f=>f.name.toLowerCase().endsWith('.dbf'));
        if(!shpEntry)throw new Error('No .shp file found in zip');
        const shpBuf=await shpEntry.async('arraybuffer');
        const dbfBuf=dbfEntry?await dbfEntry.async('arraybuffer'):undefined;
        const source=await shapefile.open(shpBuf,dbfBuf);
        const features=[];
        let result;
        while(!(result=await source.read()).done){features.push(result.value);}
        geojson={type:'FeatureCollection',features};
      }else if(name.endsWith('.geojson')||name.endsWith('.json')){
        geojson=JSON.parse(await file.text());
      }else{
        throw new Error('Unsupported file type. Use .zip (shapefile) or .geojson');
      }
      const id=++layerCounter.current;
      const colorIdx=(id-1)%LAYER_COLORS.length;
      const color=LAYER_COLORS[colorIdx];
      const leafletLayer=L.geoJSON(geojson,{
        style:{color,weight:2,fillColor:color,fillOpacity:.15},
        onEachFeature:(feature,layer)=>{
          if(feature.properties){
            const props=Object.entries(feature.properties).map(([k,v])=>`<tr><td style="color:#94A3B8;padding:2px 6px">${k}</td><td style="color:#E2E8F0;padding:2px 6px">${v}</td></tr>`).join('');
            layer.bindPopup(`<div style="font-family:sans-serif;font-size:11px;background:#1C2D3E;color:#E2E8F0;max-height:200px;overflow-y:auto"><table>${props}</table></div>`,{maxWidth:300});
          }
          layer.on('mouseover',()=>layer.setStyle({fillOpacity:.3,weight:3}));
          layer.on('mouseout',()=>layer.setStyle({fillOpacity:.15,weight:2}));
        }
      }).addTo(mapInst.current);
      try{mapInst.current.fitBounds(leafletLayer.getBounds(),{padding:[20,20]});}catch(e){}
      const featureCount=geojson.features?geojson.features.length:1;
      setShapeLayers(prev=>[...prev,{id,name:file.name,color,visible:true,layer:leafletLayer,featureCount}]);
    }catch(err){
      alert('Error loading file: '+err.message);
    }finally{
      setLoadingShape(false);
    }
  }

  function toggleLayer(id){
    setShapeLayers(prev=>prev.map(l=>{
      if(l.id===id){
        if(l.visible)mapInst.current.removeLayer(l.layer);
        else l.layer.addTo(mapInst.current);
        return{...l,visible:!l.visible};
      }
      return l;
    }));
  }

  function removeLayer(id){
    setShapeLayers(prev=>{
      const l=prev.find(x=>x.id===id);
      if(l)mapInst.current.removeLayer(l.layer);
      return prev.filter(x=>x.id!==id);
    });
  }

  function onDrop(e){
    e.preventDefault();setDragOver(false);
    const file=e.dataTransfer.files[0];
    if(file)handleFile(file);
  }

  return(
    <div style={{flex:1,display:'flex',height:'100%',overflow:'hidden'}}>
      {/* Layer Panel */}
      <div style={{width:220,background:'#0A1520',borderRight:'1px solid #1E3448',display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'12px 14px',borderBottom:'1px solid #1E3448'}}>
          <div style={{fontSize:11,fontWeight:700,color:'#94A3B8',textTransform:'uppercase',letterSpacing:.6,marginBottom:8}}>Shapefile Layers</div>
          <label style={{display:'block',width:'100%'}}>
            <div className="btn btn-outline" style={{width:'100%',textAlign:'center',fontSize:11,cursor:'pointer',marginBottom:6}}>
              {loadingShape?'Loading…':'📂 Upload Layer'}
            </div>
            <input type="file" accept=".zip,.geojson,.json" style={{display:'none'}} disabled={loadingShape}
              onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0]);e.target.value='';}}/>
          </label>
          <div style={{fontSize:10,color:'#475569',textAlign:'center'}}>Or drag & drop onto map</div>
          <div style={{fontSize:10,color:'#475569',textAlign:'center',marginTop:2}}>Supports .zip (shapefile) · .geojson</div>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:8}}>
          {shapeLayers.length===0&&(
            <div style={{padding:'20px 10px',textAlign:'center',color:'#475569',fontSize:11}}>
              No layers uploaded yet.<br/>Upload a shapefile to visualize burn unit boundaries.
            </div>
          )}
          {shapeLayers.map(l=>(
            <div key={l.id} style={{background:'#1C2D3E',borderRadius:6,padding:'8px 10px',marginBottom:6,opacity:l.visible?1:.5}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                <div style={{width:10,height:10,borderRadius:2,background:l.color,flexShrink:0}}/>
                <span style={{fontSize:11,color:'#E2E8F0',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.name}</span>
              </div>
              <div style={{fontSize:10,color:'#64748B',marginBottom:6}}>{l.featureCount} feature{l.featureCount!==1?'s':''}</div>
              <div style={{display:'flex',gap:4}}>
                <button className="btn btn-outline btn-sm" style={{flex:1,fontSize:10,padding:'3px 6px'}} onClick={()=>toggleLayer(l.id)}>{l.visible?'Hide':'Show'}</button>
                <button className="btn btn-danger btn-sm" style={{fontSize:10,padding:'3px 8px'}} onClick={()=>removeLayer(l.id)}>✕</button>
              </div>
            </div>
          ))}
        </div>
        <div style={{padding:'12px 14px',borderTop:'1px solid #1E3448'}}>
          <div style={{fontSize:11,fontWeight:700,color:'#94A3B8',textTransform:'uppercase',letterSpacing:.6,marginBottom:8}}>Burn Units</div>
          <div style={{fontSize:10,color:'#64748B',marginBottom:6}}>Priority legend:</div>
          {[['#52B788','High (≥80)'],['#F59E0B','Medium (60–79)'],['#60A5FA','Lower (<60)']].map(([c,l])=>(
            <div key={l} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:c,flexShrink:0}}/>
              <span style={{fontSize:10,color:'#94A3B8'}}>{l}</span>
            </div>
          ))}
        </div>
      </div>
      {/* Map */}
      <div style={{flex:1,position:'relative'}}
        onDragOver={e=>{e.preventDefault();setDragOver(true);}}
        onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDragOver(false);}}
        onDrop={onDrop}>
        <div ref={mapRef} style={{width:'100%',height:'100%'}}/>
        {dragOver&&(
          <div style={{position:'absolute',inset:0,background:'rgba(82,183,136,.12)',border:'3px dashed #52B788',borderRadius:0,zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:10,pointerEvents:'none'}}>
            <div style={{fontSize:48}}>📁</div>
            <div style={{fontSize:16,fontWeight:700,color:'#52B788'}}>Drop shapefile or GeoJSON here</div>
          </div>
        )}
        {loadingShape&&(
          <div style={{position:'absolute',top:12,left:'50%',transform:'translateX(-50%)',background:'#1C2D3E',border:'1px solid #2D4057',borderRadius:8,padding:'8px 16px',fontSize:12,color:'#E2E8F0',zIndex:1000}}>
            ⏳ Loading shapefile…
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Weather View ─────────────────────────────────────────────────────────────
function WeatherView({units}){
  const [sel,setSel]=useState(units[0]||null);
  useEffect(()=>{if(!sel&&units.length)setSel(units[0]);},[units]);
  if(!sel)return<div className="content"><div className="card">No units loaded.</div></div>;
  const c=sel.currentCond||{};
  const r=sel.rx||{};
  return(
    <div className="content">
      <div style={{marginBottom:14}}>
        <select className="form-select" style={{maxWidth:320}} value={sel.id} onChange={e=>setSel(units.find(u=>u.id===e.target.value))}>
          {units.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
        </select>
      </div>
      <div className="grid-4" style={{marginBottom:16}}>
        {[
          {label:'Temperature',val:`${c.temp||'—'}°F`,range:`${r.tempMin}–${r.tempMax}°F`,ok:c.temp>=r.tempMin&&c.temp<=r.tempMax,icon:'🌡️'},
          {label:'Relative Humidity',val:`${c.rh||'—'}%`,range:`${r.rhMin}–${r.rhMax}%`,ok:c.rh>=r.rhMin&&c.rh<=r.rhMax,icon:'💧'},
          {label:'Wind Speed',val:`${c.wind||'—'} mph`,range:`${r.windMin}–${r.windMax} mph`,ok:c.wind>=r.windMin&&c.wind<=r.windMax,icon:'💨'},
          {label:'Air Quality Index',val:`${c.aqi||'—'}`,range:`≤${r.aqiMax}`,ok:c.aqi<=r.aqiMax,icon:'🌫️'},
        ].map(item=>(
          <div key={item.label} className="card" style={{borderColor:item.ok?'#2D6A4F':'#7F1D1D'}}>
            <div style={{fontSize:20,marginBottom:6}}>{item.icon}</div>
            <div className="card-title">{item.label}</div>
            <div className="stat-value" style={{fontSize:22,marginTop:4,color:item.ok?'#52B788':'#F87171'}}>{item.val}</div>
            <div className="stat-sub">Target: {item.range}</div>
          </div>
        ))}
      </div>
      <div className="grid-2">
        <div className="card">
          <div className="card-header"><span className="card-title">Fuel Moisture</span></div>
          {[
            {label:'10-hr Fuel Moisture',val:c.fm10,max:r.fm10Max,unit:'%'},
            {label:'100-hr Fuel Moisture',val:c.fm100,max:r.fm100Max,unit:'%'},
          ].map(item=>(
            <div key={item.label} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:12,color:'#94A3B8'}}>{item.label}</span>
                <span style={{fontSize:12,fontWeight:700,color:item.val<=item.max?'#52B788':'#F87171'}}>{item.val||'—'}{item.unit} / ≤{item.max}{item.unit}</span>
              </div>
              <div style={{height:6,background:'#1E3448',borderRadius:3,overflow:'hidden'}}>
                <div style={{width:`${Math.min(100,(item.val/item.max)*100)}%`,height:'100%',background:item.val<=item.max?'#52B788':'#F87171',borderRadius:3}}/>
              </div>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">Fire Indices</span></div>
          {[
            {label:'Haines Index',val:c.haines,max:r.hainesMax,dir:'max'},
            {label:'Energy Release Component',val:c.erc,max:r.ercMax,dir:'max'},
          ].map(item=>(
            <div key={item.label} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:12,color:'#94A3B8'}}>{item.label}</span>
                <span style={{fontSize:12,fontWeight:700,color:item.val<=item.max?'#52B788':'#F87171'}}>{item.val||'—'} / ≤{item.max}</span>
              </div>
              <div style={{height:6,background:'#1E3448',borderRadius:3,overflow:'hidden'}}>
                <div style={{width:`${Math.min(100,(item.val/item.max)*100)}%`,height:'100%',background:item.val<=item.max?'#52B788':'#F87171',borderRadius:3}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── AQI View ─────────────────────────────────────────────────────────────────
function AQIView({units}){
  const sorted=[...units].sort((a,b)=>((b.currentCond||{}).aqi||0)-((a.currentCond||{}).aqi||0));
  function aqiColor(v){return v<=50?'#52B788':v<=100?'#FCD34D':v<=150?'#FB923C':'#F87171';}
  function aqiLabel(v){return v<=50?'Good':v<=100?'Moderate':v<=150?'Unhealthy for Sensitive Groups':'Unhealthy';}
  return(
    <div className="content">
      <div className="card" style={{marginBottom:16}}>
        <div className="card-header"><span className="card-title">Air Quality Index — All Units</span><span style={{fontSize:11,color:'#64748B'}}>Simulated · Connect AirNow API for live data</span></div>
        {sorted.map(u=>{
          const aqi=(u.currentCond||{}).aqi||0;
          const maxAqi=(u.rx||{}).aqiMax||100;
          return(
            <div key={u.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid #152032'}}>
              <div style={{width:40,height:40,borderRadius:8,background:aqiColor(aqi),display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#0F1923',flexShrink:0}}>{aqi}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:600,color:'#E2E8F0'}}>{u.name}</div>
                <div style={{fontSize:10,color:'#64748B'}}>{u.forest} · {aqiLabel(aqi)}</div>
                <div style={{marginTop:4,height:4,background:'#1E3448',borderRadius:2,overflow:'hidden'}}>
                  <div style={{width:`${Math.min(100,(aqi/200)*100)}%`,height:'100%',background:aqiColor(aqi),borderRadius:2}}/>
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:11,color:'#64748B'}}>Rx limit</div>
                <div style={{fontSize:13,fontWeight:700,color:aqi<=maxAqi?'#52B788':'#F87171'}}>≤{maxAqi}</div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="grid-3">
        {[['0–50','Good','Favorable for burns. No smoke impacts expected.','#52B788'],
          ['51–100','Moderate','Monitor smoke dispersion. Brief periods acceptable.','#FCD34D'],
          ['101–150','USG / Unhealthy','Suspend operations. Smoke management required.','#F87171']
        ].map(([range,label,desc,color])=>(
          <div key={label} className="card" style={{borderColor:color}}>
            <div style={{fontSize:22,fontWeight:700,color,marginBottom:4}}>{range}</div>
            <div style={{fontSize:12,fontWeight:700,color:'#E2E8F0',marginBottom:4}}>{label}</div>
            <div style={{fontSize:11,color:'#64748B'}}>{desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Add Unit Modal ───────────────────────────────────────────────────────────
const STEP_LABELS=['Basic Info','Location','Prescription','Smoke & Fuels','Scheduling','Review'];

function AddUnitModal({onClose,onSave}){
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({
    name:'',unitId:'',agency:'USFS',forest:'',district:'',burnBoss:'',
    lat:'',lon:'',acres:'',status:'Planned',complexity:'Low',objectives:'',fuels:'',
    tempMin:'40',tempMax:'75',rhMin:'25',rhMax:'55',windMin:'3',windMax:'14',windDir:'SW-NW',
    fm10Max:'12',fm100Max:'18',fmLiveMin:'85',hainesMax:'5',ercMax:'45',
    mixHgtMin:'2000',transportMin:'10',flameLenMax:'4',aqiMax:'100',
    sClass:'II',dispersal:'Good',transportWind:'SW',
    targetMonths:[],
    temp:'55',rh:'40',wind:'8',fm10:'10',fm100:'15',haines:'4',erc:'30',aqi:'45'
  });
  function upd(k,v){setForm(f=>({...f,[k]:v}));}
  function toggleMonth(m){
    setForm(f=>({...f,targetMonths:f.targetMonths.includes(m)?f.targetMonths.filter(x=>x!==m):[...f.targetMonths,m].sort((a,b)=>a-b)}));
  }
  function calcPriority(){
    const wp=form.targetMonths.length?Math.round(form.targetMonths.length/12*30):15;
    const score=Math.round((100-wp)*0.6+(form.status==='Ready'?20:form.status==='Approved'?10:0)+(parseInt(form.acres)>500?10:parseInt(form.acres)>200?5:0));
    return{windowPct:wp,priorityScore:Math.min(100,score)};
  }
  function handleSave(){
    const{windowPct,priorityScore}=calcPriority();
    const monthly=Array(12).fill(0).map((_,i)=>form.targetMonths.includes(i+1)?Math.round(10+Math.random()*25):Math.round(Math.random()*5));
    onSave({
      name:form.name,unitId:form.unitId,agency:form.agency,forest:form.forest,
      district:form.district,burnBoss:form.burnBoss,lat:parseFloat(form.lat)||37.5,
      lon:parseFloat(form.lon)||-119.5,acres:parseInt(form.acres)||0,
      status:form.status,complexity:form.complexity,objectives:form.objectives,fuels:form.fuels,
      rx:{tempMin:+form.tempMin,tempMax:+form.tempMax,rhMin:+form.rhMin,rhMax:+form.rhMax,
        windMin:+form.windMin,windMax:+form.windMax,windDir:form.windDir,
        fm10Max:+form.fm10Max,fm100Max:+form.fm100Max,fmLiveMin:+form.fmLiveMin,
        hainesMax:+form.hainesMax,ercMax:+form.ercMax,mixHgtMin:+form.mixHgtMin,
        transportMin:+form.transportMin,flameLenMax:+form.flameLenMax,aqiMax:+form.aqiMax},
      smoke:{sClass:form.sClass,dispersal:form.dispersal,transportWind:form.transportWind},
      targetMonths:form.targetMonths,monthly,windowPct,priorityScore,
      currentCond:{temp:+form.temp,rh:+form.rh,wind:+form.wind,
        fm10:+form.fm10,fm100:+form.fm100,haines:+form.haines,erc:+form.erc,aqi:+form.aqi}
    });
  }

  const steps=[
    // Step 0: Basic Info
    <div key="0">
      <div className="form-row"><div className="form-group"><label className="form-label">Unit Name *</label><input className="form-input" value={form.name} onChange={e=>upd('name',e.target.value)} placeholder="Crane Flat Understory"/></div><div className="form-group"><label className="form-label">Unit ID</label><input className="form-input" value={form.unitId} onChange={e=>upd('unitId',e.target.value)} placeholder="STF-001"/></div></div>
      <div className="form-row"><div className="form-group"><label className="form-label">Agency</label><select className="form-select" value={form.agency} onChange={e=>upd('agency',e.target.value)}><option>USFS</option><option>CAL FIRE</option><option>LG</option><option>WFS</option><option>NPS</option><option>BLM</option><option>BIA</option><option>Tribal</option></select></div><div className="form-group"><label className="form-label">Status</label><select className="form-select" value={form.status} onChange={e=>upd('status',e.target.value)}><option>Draft</option><option>Planned</option><option>Approved</option><option>Ready</option><option>Completed</option><option>Cancelled</option></select></div></div>
      <div className="form-row"><div className="form-group"><label className="form-label">National Forest / Unit</label><input className="form-input" value={form.forest} onChange={e=>upd('forest',e.target.value)} placeholder="Stanislaus NF"/></div><div className="form-group"><label className="form-label">District / Zone</label><input className="form-input" value={form.district} onChange={e=>upd('district',e.target.value)} placeholder="Groveland"/></div></div>
      <div className="form-row"><div className="form-group"><label className="form-label">Burn Boss</label><input className="form-input" value={form.burnBoss} onChange={e=>upd('burnBoss',e.target.value)} placeholder="Smith, J."/></div><div className="form-group"><label className="form-label">Complexity</label><select className="form-select" value={form.complexity} onChange={e=>upd('complexity',e.target.value)}><option>Low</option><option>Moderate</option><option>High</option></select></div></div>
    </div>,
    // Step 1: Location
    <div key="1">
      <div className="form-row"><div className="form-group"><label className="form-label">Latitude</label><input className="form-input" type="number" step="0.001" value={form.lat} onChange={e=>upd('lat',e.target.value)} placeholder="37.76"/></div><div className="form-group"><label className="form-label">Longitude</label><input className="form-input" type="number" step="0.001" value={form.lon} onChange={e=>upd('lon',e.target.value)} placeholder="-119.83"/></div></div>
      <div className="form-group"><label className="form-label">Acres</label><input className="form-input" type="number" value={form.acres} onChange={e=>upd('acres',e.target.value)} placeholder="340"/></div>
      <div className="form-group"><label className="form-label">Objectives (Element 3)</label><textarea className="form-input" rows={3} value={form.objectives} onChange={e=>upd('objectives',e.target.value)} placeholder="Reduce ladder fuels, restore ponderosa pine understory..."/></div>
      <div className="form-group"><label className="form-label">Fuel Description</label><input className="form-input" value={form.fuels} onChange={e=>upd('fuels',e.target.value)} placeholder="Mixed conifer litter, manzanita shrub"/></div>
    </div>,
    // Step 2: Prescription (Element 7B)
    <div key="2">
      <div style={{marginBottom:10,fontSize:11,color:'#64748B'}}>PMS 484-1 Element 7B — Prescription Parameters</div>
      <div className="form-row"><div className="form-group"><label className="form-label">Temp Min (°F)</label><input className="form-input" type="number" value={form.tempMin} onChange={e=>upd('tempMin',e.target.value)}/></div><div className="form-group"><label className="form-label">Temp Max (°F)</label><input className="form-input" type="number" value={form.tempMax} onChange={e=>upd('tempMax',e.target.value)}/></div></div>
      <div className="form-row"><div className="form-group"><label className="form-label">RH Min (%)</label><input className="form-input" type="number" value={form.rhMin} onChange={e=>upd('rhMin',e.target.value)}/></div><div className="form-group"><label className="form-label">RH Max (%)</label><input className="form-input" type="number" value={form.rhMax} onChange={e=>upd('rhMax',e.target.value)}/></div></div>
      <div className="form-row-3"><div className="form-group"><label className="form-label">Wind Min (mph)</label><input className="form-input" type="number" value={form.windMin} onChange={e=>upd('windMin',e.target.value)}/></div><div className="form-group"><label className="form-label">Wind Max (mph)</label><input className="form-input" type="number" value={form.windMax} onChange={e=>upd('windMax',e.target.value)}/></div><div className="form-group"><label className="form-label">Wind Direction</label><input className="form-input" value={form.windDir} onChange={e=>upd('windDir',e.target.value)} placeholder="SW-NW"/></div></div>
      <div className="form-row"><div className="form-group"><label className="form-label">10-hr FM Max (%)</label><input className="form-input" type="number" value={form.fm10Max} onChange={e=>upd('fm10Max',e.target.value)}/></div><div className="form-group"><label className="form-label">100-hr FM Max (%)</label><input className="form-input" type="number" value={form.fm100Max} onChange={e=>upd('fm100Max',e.target.value)}/></div></div>
      <div className="form-row-3"><div className="form-group"><label className="form-label">Haines Index Max</label><input className="form-input" type="number" value={form.hainesMax} onChange={e=>upd('hainesMax',e.target.value)}/></div><div className="form-group"><label className="form-label">ERC Max</label><input className="form-input" type="number" value={form.ercMax} onChange={e=>upd('ercMax',e.target.value)}/></div><div className="form-group"><label className="form-label">AQI Max</label><input className="form-input" type="number" value={form.aqiMax} onChange={e=>upd('aqiMax',e.target.value)}/></div></div>
      <div className="form-row"><div className="form-group"><label className="form-label">Mix Height Min (ft)</label><input className="form-input" type="number" value={form.mixHgtMin} onChange={e=>upd('mixHgtMin',e.target.value)}/></div><div className="form-group"><label className="form-label">Transport Wind Min (mph)</label><input className="form-input" type="number" value={form.transportMin} onChange={e=>upd('transportMin',e.target.value)}/></div></div>
    </div>,
    // Step 3: Smoke & Current Conditions
    <div key="3">
      <div style={{marginBottom:10,fontSize:11,color:'#64748B'}}>Smoke Management (Element 19) &amp; Current Conditions</div>
      <div className="form-row-3">
        <div className="form-group"><label className="form-label">Smoke Class</label><select className="form-select" value={form.sClass} onChange={e=>upd('sClass',e.target.value)}><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option></select></div>
        <div className="form-group"><label className="form-label">Dispersal</label><select className="form-select" value={form.dispersal} onChange={e=>upd('dispersal',e.target.value)}><option>Good</option><option>Moderate</option><option>Poor</option></select></div>
        <div className="form-group"><label className="form-label">Transport Wind Dir</label><input className="form-input" value={form.transportWind} onChange={e=>upd('transportWind',e.target.value)} placeholder="SW"/></div>
      </div>
      <div style={{marginBottom:10,marginTop:8,fontSize:11,color:'#64748B',borderTop:'1px solid #1E3448',paddingTop:12}}>Current Conditions (for Go/No-Go check)</div>
      <div className="form-row"><div className="form-group"><label className="form-label">Current Temp (°F)</label><input className="form-input" type="number" value={form.temp} onChange={e=>upd('temp',e.target.value)}/></div><div className="form-group"><label className="form-label">Current RH (%)</label><input className="form-input" type="number" value={form.rh} onChange={e=>upd('rh',e.target.value)}/></div></div>
      <div className="form-row"><div className="form-group"><label className="form-label">Current Wind (mph)</label><input className="form-input" type="number" value={form.wind} onChange={e=>upd('wind',e.target.value)}/></div><div className="form-group"><label className="form-label">Current AQI</label><input className="form-input" type="number" value={form.aqi} onChange={e=>upd('aqi',e.target.value)}/></div></div>
      <div className="form-row"><div className="form-group"><label className="form-label">10-hr FM (%)</label><input className="form-input" type="number" value={form.fm10} onChange={e=>upd('fm10',e.target.value)}/></div><div className="form-group"><label className="form-label">100-hr FM (%)</label><input className="form-input" type="number" value={form.fm100} onChange={e=>upd('fm100',e.target.value)}/></div></div>
      <div className="form-row"><div className="form-group"><label className="form-label">Haines Index</label><input className="form-input" type="number" value={form.haines} onChange={e=>upd('haines',e.target.value)}/></div><div className="form-group"><label className="form-label">ERC</label><input className="form-input" type="number" value={form.erc} onChange={e=>upd('erc',e.target.value)}/></div></div>
    </div>,
    // Step 4: Scheduling
    <div key="4">
      <div style={{marginBottom:12,fontSize:11,color:'#64748B'}}>Select target burn months based on historical weather windows.</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
        {MONTHS.map((m,i)=>(
          <div key={m} onClick={()=>toggleMonth(i+1)} style={{padding:'10px 8px',borderRadius:6,border:`2px solid ${form.targetMonths.includes(i+1)?'#52B788':'#2D4057'}`,background:form.targetMonths.includes(i+1)?'#1B4332':'#152032',cursor:'pointer',textAlign:'center',fontSize:13,fontWeight:600,color:form.targetMonths.includes(i+1)?'#52B788':'#64748B',transition:'all .15s'}}>
            {m}
          </div>
        ))}
      </div>
      <div style={{marginTop:14,padding:'10px 12px',background:'#152032',borderRadius:8,fontSize:12,color:'#94A3B8'}}>
        {form.targetMonths.length===0?'No months selected — please select at least one target burn month.':
        `Selected: ${form.targetMonths.map(m=>MONTHS[m-1]).join(', ')}`}
      </div>
    </div>,
    // Step 5: Review
    <div key="5">
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        {[
          ['Unit Name',form.name||'—'],['Unit ID',form.unitId||'—'],['Agency',form.agency],
          ['Forest',form.forest||'—'],['District',form.district||'—'],['Acres',form.acres||'—'],
          ['Status',form.status],['Complexity',form.complexity],['Burn Boss',form.burnBoss||'—'],
          ['Temp Range',`${form.tempMin}–${form.tempMax}°F`],['RH Range',`${form.rhMin}–${form.rhMax}%`],
          ['Wind',`${form.windMin}–${form.windMax} mph ${form.windDir}`],
          ['Target Months',form.targetMonths.map(m=>MONTHS[m-1]).join(', ')||'None'],
          ['Est. Priority Score',calcPriority().priorityScore],
        ].map(([k,v])=>(
          <div key={k} style={{padding:'6px 10px',background:'#152032',borderRadius:4}}>
            <div style={{fontSize:10,color:'#64748B',marginBottom:1}}>{k}</div>
            <div style={{fontSize:12,color:'#E2E8F0',fontWeight:600}}>{v}</div>
          </div>
        ))}
      </div>
    </div>
  ];

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target.className==='modal-overlay')onClose();}}>
      <div className="modal">
        <div className="modal-header">
          <h3>Add Burn Unit — PMS 484-1</h3>
          <button className="btn btn-outline btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="step-indicator">
            {STEP_LABELS.map((_,i)=><div key={i} className={`step-dot ${i===step?'active':i<step?'done':''}`}/>)}
          </div>
          <div style={{marginBottom:12,fontSize:12,color:'#94A3B8',fontWeight:600}}>{STEP_LABELS[step]}</div>
          {steps[step]}
        </div>
        <div className="modal-footer">
          <div style={{fontSize:11,color:'#64748B'}}>Step {step+1} of {STEP_LABELS.length}</div>
          <div style={{display:'flex',gap:8}}>
            {step>0&&<button className="btn btn-outline" onClick={()=>setStep(s=>s-1)}>Back</button>}
            {step<STEP_LABELS.length-1&&<button className="btn btn-primary" onClick={()=>setStep(s=>s+1)}>Next →</button>}
            {step===STEP_LABELS.length-1&&<button className="btn btn-primary" onClick={handleSave} disabled={!form.name}>Save Unit</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState('dashboard');
  const [units,setUnits]=useState([]);
  const [usingSample,setUsingSample]=useState(false);
  const [selectedUnit,setSelectedUnit]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [toasts,setToasts]=useState([]);
  const [realtimeOk,setRealtimeOk]=useState(false);
  const toastId=useRef(0);

  function addToast(t){
    const id=++toastId.current;
    setToasts(prev=>[...prev,{...t,id}]);
    setTimeout(()=>setToasts(prev=>prev.filter(x=>x.id!==id)),4000);
  }

  // Load from Supabase
  useEffect(()=>{
    async function loadUnits(){
      try{
        const{data,error}=await sb.from('burn_units').select('*').order('priority_score',{ascending:false});
        if(error||!data||data.length===0){
          setUnits(SAMPLE_UNITS);
          setUsingSample(true);
        }else{
          setUnits(data.map(unitFromDB));
          setUsingSample(false);
        }
      }catch(e){
        setUnits(SAMPLE_UNITS);
        setUsingSample(true);
      }
    }
    loadUnits();

    // Real-time subscription
    const channel=sb.channel('burn_unit_changes')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'burn_units'},payload=>{
        const newUnit=unitFromDB(payload.new);
        setUnits(prev=>{
          if(prev.find(u=>u.id===newUnit.id))return prev;
          return [...prev,newUnit].sort((a,b)=>(b.priorityScore||0)-(a.priorityScore||0));
        });
        setUsingSample(false);
        addToast({title:'New unit added',msg:newUnit.name,icon:'🔥',type:'green'});
      })
      .on('postgres_changes',{event:'DELETE',schema:'public',table:'burn_units'},payload=>{
        setUnits(prev=>prev.filter(u=>u.id!==payload.old.id));
        addToast({title:'Unit removed',msg:payload.old.name||'',icon:'🗑️',type:'orange'});
      })
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'burn_units'},payload=>{
        const updated=unitFromDB(payload.new);
        setUnits(prev=>prev.map(u=>u.id===updated.id?updated:u));
        addToast({title:'Unit updated',msg:updated.name,icon:'📝',type:'orange'});
      })
      .subscribe(status=>setRealtimeOk(status==='SUBSCRIBED'));

    return()=>{sb.removeChannel(channel);};
  },[]);

  async function saveUnit(unitData){
    try{
      if(usingSample){
        const newUnit={...unitData,id:'local-'+Date.now()};
        setUnits(prev=>[...prev,newUnit].sort((a,b)=>(b.priorityScore||0)-(a.priorityScore||0)));
        setShowAdd(false);
        addToast({title:'Unit added (local)',msg:newUnit.name,icon:'🔥',type:'green'});
        return;
      }
      const{data,error}=await sb.from('burn_units').insert([unitToDB(unitData)]).select();
      if(error)throw error;
      setShowAdd(false);
    }catch(e){
      addToast({title:'Save failed',msg:e.message,icon:'⚠️',type:'red'});
    }
  }

  async function updateStatus(id,newStatus){
    setUnits(prev=>prev.map(u=>u.id===id?{...u,status:newStatus}:u));
    if(id.startsWith('s')||id.startsWith('local'))return;
    try{
      await sb.from('burn_units').update({status:newStatus}).eq('id',id);
      addToast({title:'Status updated',msg:newStatus,icon:'✅',type:'green'});
    }catch(e){
      addToast({title:'Update failed',msg:e.message,icon:'⚠️',type:'red'});
    }
  }

  async function deleteUnit(id){
    if(id.startsWith('s')||id.startsWith('local')){
      setUnits(prev=>prev.filter(u=>u.id!==id));
      return;
    }
    try{
      await sb.from('burn_units').delete().eq('id',id);
    }catch(e){
      addToast({title:'Delete failed',msg:e.message,icon:'⚠️',type:'red'});
    }
  }

  const NAV=[
    {id:'dashboard',icon:'📊',label:'Dashboard'},
    {id:'heatmap',icon:'🌡️',label:'Heat Map'},
    {id:'calendar',icon:'📅',label:'Calendar'},
    {id:'units',icon:'🔥',label:'Burn Units',badge:units.length},
    {id:'map',icon:'🗺️',label:'Map View'},
    {id:'weather',icon:'💨',label:'Weather'},
    {id:'aqi',icon:'🌫️',label:'Air Quality'},
  ];

  const pendingCount=units.filter(u=>u.status==='Planned'||u.status==='Draft').length;

  const mainContent=()=>{
    if(view==='detail'&&selectedUnit)return<UnitDetail unit={selectedUnit} onBack={()=>setView('units')} onStatusChange={updateStatus}/>;
    if(view==='heatmap')return<HeatMap units={units}/>;
    if(view==='calendar')return<CalendarView units={units}/>;
    if(view==='units')return<BurnUnitsTable units={units} setSelectedUnit={setSelectedUnit} setView={setView} onAdd={()=>setShowAdd(true)} onDelete={deleteUnit}/>;
    if(view==='map')return<MapView units={units} setSelectedUnit={setSelectedUnit} setView={setView}/>;
    if(view==='weather')return<WeatherView units={units}/>;
    if(view==='aqi')return<AQIView units={units}/>;
    return<Dashboard units={units} setView={setView} setSelectedUnit={setSelectedUnit}/>;
  };

  return(
    <div className="app">
      <div className="sidebar">
        <div className="logo">
          <h1>🔥 RxFire Planner</h1>
          <p>California Prescribed Fire Scheduling</p>
        </div>
        <nav className="nav">
          <div className="nav-section">Planning</div>
          {NAV.map(n=>(
            <div key={n.id} className={`nav-item ${view===n.id||(view==='detail'&&n.id==='units')?'active':''}`} onClick={()=>{setView(n.id);setSelectedUnit(null);}}>
              <span className="icon">{n.icon}</span>
              <span>{n.label}</span>
              {n.badge!=null&&<span className={`badge ${n.id==='units'&&pendingCount>0?'orange':''}`}>{n.badge}</span>}
            </div>
          ))}
        </nav>
        <div className="agency-info">
          <strong>USFS — Pacific SW Region</strong>
          <div style={{marginTop:4,display:'flex',alignItems:'center',gap:6}}>
            {realtimeOk?<><div className="realtime-dot"/><span>Live Sync Active</span></>:<span style={{color:'#475569'}}>⚡ Sample Data</span>}
          </div>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <h2>{view==='detail'&&selectedUnit?selectedUnit.name:NAV.find(n=>n.id===view)?.label||'Dashboard'}</h2>
          {usingSample&&(
            <div className="info-banner" style={{margin:0,padding:'4px 10px',fontSize:11}}>
              📋 Sample data · <a href="#" style={{color:'#60A5FA'}} onClick={e=>{e.preventDefault();addToast({title:'Supabase Setup',msg:'Run the SQL in README.txt to enable live data',icon:'📋',type:'orange'});}}>Setup DB</a>
            </div>
          )}
          {(view==='units'||view==='dashboard')&&(
            <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(true)}>+ Add Unit</button>
          )}
        </div>
        {view==='map'?<div style={{flex:1,display:'flex',overflow:'hidden'}}>{mainContent()}</div>:mainContent()}
      </div>

      {showAdd&&<AddUnitModal onClose={()=>setShowAdd(false)} onSave={saveUnit}/>}
      <ToastContainer toasts={toasts}/>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
<style>
.dark-popup .leaflet-popup-content-wrapper{background:#1C2D3E;border:1px solid #2D4057;color:#E2E8F0;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.dark-popup .leaflet-popup-tip{background:#1C2D3E;}
</style>
</body>
</html>
